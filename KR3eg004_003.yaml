body:
  text: 下卷雜氣論日月星辰天之有象可睹水火土石地之有形可求昆蟲草木動植之物可見寒熱溫涼四時之氣往來可覺至於山嵐瘴氣嶺南毒霧鹹得地之濁氣猶或可察而惟天地之雜氣種種不一亦猶天之有日月星辰地之有水火土石氣交之中有昆蟲草木之不一也草木有野葛巴豆星辰有羅計熒惑昆蟲有毒蛇猛獸土石有雄硫硇信萬物各有善惡不等是知雜氣之毒有優劣也然氣無所可求無象可見況無聲復無臭何能得睹得聞人惡得而知氣又惡得而知其氣之不一也是氣也其來無時其著無方衆人有觸之者各隨其氣而為諸病焉其為病也或時衆人發頤或時衆人頭面浮腫俗名為大頭瘟是也或時衆人咽痛或時音啞俗名為是蝦蟆瘟是也或時衆人瘧痢或為痹氣或為痘瘡或為斑疹或為瘡疥疔瘇或時衆人目赤腫痛或時衆人嘔血暴下俗名為瓜瓤瘟探頭瘟是也或時衆人癭痃俗名為疙瘩瘟是也為病種種難以枚舉大約病偏於一方延門闔戶衆人相同者皆時行之氣即雜氣為病也為病種種是知氣之不一也蓋當時適有某氣專入某臟腑其經絡專發為某病故衆人之病相同是知氣之不一非關臟腑經絡或為之證也夫病不可以年歲四時為拘蓋非五運六氣所即定者是知氣之所至無時也或發於城市或發於村落他處安然無有是知氣之所著無方也疫氣者亦雜氣中之一但有甚於他氣故為病頗重因名之癘氣雖有多寡不同然無歲不有至於瓜瓤瘟疙瘩瘟緩者朝發夕死急者頃刻而亡此在諸疫之最重者幸而幾百年來罕有之證不可以常疫並論也至於發頤咽痛目赤斑疹之類其時村落中偶有一二人所患者雖不與衆人等然考其證甚合某年某處衆人所患之病纖悉相同治法無異此即當年之雜氣但目今所鐘不厚所患者稀少耳此又不可以衆人無有斷為非雜氣也況雜氣為病最多然舉世皆誤認為六氣假如誤認為風者如大麻風鶴膝風痛風歷節風老人中風腸風癘風癇風之類概用風藥未嘗一效實非風也皆雜氣為病耳至又誤認為火者如疔瘡發背癰疽腫毒氣毒流注流火丹毒與夫發斑痘疹之類以為痛癢瘡瘍皆屬心火投芩連梔柏未嘗一效實非火也亦雜氣之所為耳至於誤認為暑者如霍亂吐瀉瘧痢暴注腹痛絞腸痧之類皆誤認為暑因作暑證治之未嘗一效與暑何與焉至於一切雜證無因而生者並皆雜氣所成從古未聞者何耶蓋因諸氣來而不知感而不覺惟向風寒暑濕所見之氣求之是舍無聲無臭不睹不聞之氣推察既錯認病原未免誤投他藥大易所謂或繫之牛行人之得邑人之災也劉河間作原病式蓋祖五運六氣百病皆原於風寒暑濕燥火是無出此六氣為病實不知雜氣為病更多於六氣為病者百倍不知六氣有限現在可測雜氣無窮茫然不可測也專務六氣不言雜氣焉能包括天下之病歟論氣盛衰其年疫氣盛行所患皆重最能傳染即童輩皆知言其為疫至於微疫反覺無有蓋毒氣所鐘有厚薄也其年疫氣衰少閭里所患者不過幾人且不能傳染時師皆以傷寒為名不知者固不言疫知者亦不便言疫然則何以知其為疫蓋脈證與盛行之年所患之證纖悉相同至於用藥取效毫無差別是以知溫疫四時皆有常年不斷但有多寡輕重耳疫氣不行之年微疫轉有衆人皆以感冒為名實不知為疫也設用發散之劑雖不合病然亦無大害疫自愈實非藥也即不藥亦自愈至有稍重者誤投發散其害尚淺若誤用補劑及寒涼反成痼疾不可不辨論氣所傷不同所謂雜氣者雖曰天地之氣實由方土之氣也蓋其氣從地而起有是氣則有是病譬如所言天地生萬物然亦由方土之産也但植物藉雨露而滋生動物藉飲食而頤養蓋先有是氣然後有是物推而廣之有無限之氣因有無限之物也但二五之精未免生剋制化是以萬物各有宜忌宜者益而忌者損損者制也故萬物各有所制如貓制鼠如鼠制象之類既知以物制物即知以氣制物矣以氣制物者蟹得霧則死棗得霧則枯之類此有形之氣動植之物皆為所制也至於無形之氣偏中於動物者如牛瘟羊瘟雞瘟鴨瘟豈但人疫而已哉然牛病而羊不病雞病而鴨不病人病而禽獸不病究其所傷不同因其氣各異也知其氣各異故謂之雜氣夫物者氣之化也氣者物之變也氣即是物物即是氣知氣可以知物則知物之可以制氣矣夫物之可以制氣者藥物也如蜒蚰解蜈蚣之毒貓肉治鼠瘻之潰此受物氣之為病是以物之氣制物之氣猶或可測至於受無形雜氣為病莫知何物之能制矣惟其不知何物之能制故勉用汗吐下三法以決之嗟乎即三法且不能盡善況乃知物乎能知以物制氣一病只有一藥之到病已不煩君臣佐使品味加減之勞矣蛔厥疫邪傳裡胃熱如沸蛔動不安下既不通必反於上蛔因嘔出此常事也但治其胃蛔厥自愈每見醫家妄引經論以為臟寒蛔上入膈其人當吐蛔又云胃中冷必吐蛔之句便用烏梅丸或理中安蛔湯方中乃細辛附子乾薑桂枝川椒皆辛熱之品投之如火上添油殊不知疫證表裡上下皆熱始終從無寒證者不思現前事理徒記紙上文辭以為依經傍注坦然用之無疑因此誤人甚衆厄逆胃氣逆則為厄逆吳中稱為冷厄以冷為名遂指為胃寒不知寒熱皆令厄逆且不以本證相參專執俗語為寒遂投丁茱薑桂誤人不少此與執辭害義者尤為不典治法各從其本證而消息之如見白虎證則投白虎見承氣證則投承氣膈間痰閉則宜導痰如果胃寒丁香柿蒂散宜之然不若四逆湯功效殊捷要之但治本證厄自止其他可以類推矣似表非表似里非里時疫初起邪氣盤踞於中表裡阻隔裡氣滯而為悶表氣滯而為頭疼身痛因見頭疼身痛往往誤認為傷寒表證因用麻黃桂枝香蘇葛根敗毒九味羌活之類此皆發散之劑強求其汗妄耗津液經氣先虛邪氣不損依然發熱更有邪氣傳裡表氣不能通於內必壅於外每至午後潮熱熱甚則頭脹痛熱退即已此豈表實者耶以上似表誤為表證妄投升散之劑經氣愈實火氣上升頭疼轉甚須下之裡氣一通經氣降而頭疼立止若果感冒頭疼無時不痛為可辨也且有別證相參不可一途而取若汗若下後脈靜身涼渾身肢節反加痛甚一如被杖一如墜傷少動則痛若號呼此經氣虛營衛行澀也三四日內經氣漸回其痛漸止雖不藥必自愈設妄引經論以為風濕相搏一身盡痛不可轉側遂投疏風勝濕之劑身痛反劇似此誤人甚衆傷寒傳胃即便潮熱譫語下之無辭今時疫初起便作潮熱熱甚亦能譫語誤認為里證妄用承氣是為誅伐無辜不知伏邪附近於胃邪未入腑亦能潮熱午後熱甚亦能譫語不待胃實而後能也假令常瘧熱甚亦作譫語疸瘧不惡寒但作潮熱此豈胃實者耶以上似里誤投承氣裡氣先虛及邪陷胃轉見胸腹脹滿煩渴益甚病家見勢危篤以致更醫醫見下藥病甚乃指大黃為砒毒或投瀉心或投柴胡枳桔留邪在胃變證日增神脫氣盡而死向則不應下而反下之今則應下而反失下蓋因表裡不明用藥前後失序之誤論食時疫有首尾能食者此邪不傳胃切不可絶其飲食但不宜過食耳有愈後數日微渴微熱不思食者此微邪在胃正氣衰弱強與之即為食復有下後一日便思食食之有味當與之先與米飲一小杯加至茶甌漸進稀粥不可盡意飢則再與如忽加吞酸反覺無味乃胃氣傷也當停谷一日胃氣復復思食也仍如漸進法有愈後十數日脈靜身涼表裡俱和但不思食者此中氣不蘇當與粥飲迎之得谷後即思食覺飢久而不思食者一法以人參一錢煎湯與之少喚胃氣忽覺思食余勿服論飲煩渴思飲酌量與之若引飲過多自覺水停心下名停飲宜四苓散最妙如大渴思飲冰水及冷飲無論四時皆可量與蓋內熱之極得冷飲相救甚宜能飲一升止與半升寧使少頃再飲至於梨汁藕汁蔗漿西瓜皆可備不時之需如不欲飲冷當易百滾湯與之乃至不思飲則知胃和矣四苓湯茯苓二錢澤瀉一錢五分豬苓一錢五分陳皮一錢取長流水煎服古方有五苓散用桂枝者以太陽中風表證未罷併入膀胱用四苓以利小便加桂枝以解表邪為雙解散即如少陽並於胃以大柴胡通表裡而治之今人但見小便不利便用桂枝何異聾者之聽宮商胃本無病故用白朮以健中今不用白朮者疫邪傳胃而渴白朮性壅恐以實填實也加陳皮者和中利氣也損復邪之傷人也始而傷氣繼而傷血繼而傷肉繼而傷筋繼而傷骨邪毒既退始而復氣繼而復血繼而復肉繼而復筋繼而復骨以柔脆者易損亦易復也天傾西北地陷東南故男先傷右女先傷左及其復也男先復左女先復右以素虧者易損以素實者易復也嚴正甫正年三十時疫後脈證俱平飲食漸進忽然肢體浮腫別無所苦此即氣復也蓋大病後血未盛氣暴復血乃氣之依歸氣無所依故為浮腫嗣後飲食漸加浮腫漸消若誤投行氣利水藥則謬矣張德甫年二十患噤口痢晝夜無度肢體僅有皮骨痢雖減毫不進谷以人參一錢煎湯入口不一時身忽浮腫如吹氣球自後飲食漸進浮腫漸消腫間已有肌肉矣若大病後三焦受傷不能通調水道下輸膀胱肢體浮腫此水氣也與氣復懸絶宜金匱腎氣丸及腎氣煎若誤用行氣利水藥必劇凡水氣足冷肢體常重氣復足不冷肢體常輕為異余桂玉正年四十時疫後四肢脫力竟若癱瘓數日後右手始能動又三日左手方動又俞桂岡子室所患皆然標本諸竅乃人身之戶牖也邪自竅而入未有不由竅而出經曰未入於腑者可汗而已已入於腑者可下而已麻徵君復增汗吐下三法總是導引其邪打從門戶而出可為治法之大綱舍此皆治標云爾今時疫首尾一於為熱獨不言清熱者是知因邪而發熱但能治其邪不治其熱而熱自已夫邪之與熱猶形影相依形亡而影未有獨存者若以黃連解毒湯黃連瀉心湯純乎類聚寒涼專務清熱既無汗吐下之能焉能使邪從竅而出是忘其本徒治其標何異於小兒捕影行邪伏邪之別凡邪所客有行邪有伏邪故治法有難有易取效有遲有速假令行邪者如正傷寒始自太陽或傳陽明或傳少陽或自三陽入胃如行人經由某地本無根蒂因其漂浮之勢病形雖重若果在經一汗而解若果傳胃一下而愈藥到便能獲效先伏而後行者所謂溫疫之邪伏於膜原如鳥棲巢如獸藏穴營衛所不關藥石所不及至其發也邪毒漸張內侵於腑外淫於經營衛受傷諸證漸顯然後可得而治之方其浸淫之際邪毒尚在膜原此時但可疏利使伏邪易出邪毒既離膜原乃觀其變或出表或入里然後可導邪而去邪盡方愈初發之時毒勢漸張莫之能御其時不惟不能即瘳其疾而病證日惟加重病家見證反增即欲更醫醫家不解亦自驚疑竟不知先時感受邪甚則病甚邪微則病微病之輕重非關於醫人之生死全賴藥石故諺有云傷寒莫治頭勞怯莫治尾若果止傷寒初受於肌表不過在經之浮邪一汗即解何難治之有不知蓋指溫疫而言也所以疫邪方張之際勢不可遏但使邪毒速離膜原便是治法全在後段工夫識得表裡虛實更詳輕重緩急投劑不致差謬如是可以萬舉萬全即使感受之最重者按法治之必無殞命之理若夫久病枯極酒色耗竭耆耄風燭此等已是天真幾絶更加溫疫自是難支又不可同日而語應下諸證舌白苔漸變黃苔邪在膜原舌上白苔邪在胃家舌上黃苔苔老變為沉香色也白苔未可下黃苔宜下舌黑苔邪毒在胃熏騰於上而生黑苔有黃苔老而變焦色者有津液潤澤作軟黑苔者有舌上乾燥作硬黑苔者下後二三日黑皮自脫又有一種舌俱黑而無苔此經氣非下證也妊娠多見此陰證亦有此並非下證下后里證去舌尚黑者苔皮未脫也不可再下務在有下證方可下舌上無苔況無下證誤下舌反見離離黑色者危急當補之舌芒刺熱傷津液此疫毒之最重者急當下老人微疫無下證舌上乾燥易生苔刺用生脈散生津潤燥芒刺自去舌裂日久失下血液枯極多有此證又熱結旁流日久不治在下則津液消亡在上則邪火毒熾亦有此證急下之裂自滿舌短舌硬舌卷皆邪氣勝真氣虧急下之邪毒去真氣回舌自舒白砂苔舌上白苔乾硬如砂皮一名水晶苔乃自白苔之時津液乾燥邪雖入胃不能變黃宜急下之白苔潤澤者邪在膜原也邪微苔亦微邪氣盛苔如積粉滿布其舌未可下久而苔色不變別有下證服三消飲次早舌即變黃唇燥裂唇焦色唇口皮起口臭鼻孔如煙煤胃家熱多有此證固當下唇口皮起仍用別證互較鼻孔煤黑疫毒在胃下之無辭口燥渴更有下證者宜下之下後邪去胃和渴自減若服花粉門冬知母冀其生津止渴殊謬若大汗脈長洪而渴未可下宜白虎湯汗更出身涼渴止目赤咽乾氣噴如火小便赤黑涓滴作痛大便極臭揚手躑足脈沉而數皆為內熱之極下之無辭潮熱邪在胃有此證宜下然又有不可下者詳載似里非里條下熱入血室條下神虛譫語條下善太息胃家實呼吸不利胸膈痞悶每欲引氣下行故然心下滿心下高起如塊心下痛腹脹滿腹痛按之愈痛心下脹痛以上皆胃家邪實內結氣閉宜下之氣通則已頭脹痛胃家實氣不下降下之頭痛立止若初起頭痛別無下證未可下小便閉大便不通氣結不舒大便行小便立解誤服行氣利水藥無益大便閉轉屎氣極臭更有下證下之無辭有血液枯竭者無表裡證為虛燥宜蜜煎導及膽導大腸膠閉其人平日大便不實設遇疫邪傳裡但蒸作極臭狀如黏膠至死不結但愈蒸愈黏愈黏愈閉以致胃氣不能下行疫毒無路而出不下即死但得黏膠一去下證自除而愈協熱下利熱結旁流並宜下詳見大便條下四逆脈厥體厥並屬氣閉陽氣鬱內不能四布於外胃家實也宜下之下後反見此證者為虛脫宜補發狂胃家實陽氣盛也宜下之有虛煩似狂有因欲汗作狂並詳見本條忌下應補諸證向謂傷寒無補法者蓋傷寒時疫均是客邪然傷於寒者不過風寒乃天地之正氣尚嫌其填實而不可補今感疫氣者乃天地之毒氣補之則壅裹其毒邪火愈熾是以誤補之為害尤甚於傷寒此言其常也及言其變然又有應補者或日久失下形神幾脫或久病先虧或先受大勞或老人枯竭皆當補瀉兼施設獨行而增虛證者宜急峻補虛證散在諸篇此不再贅補之虛證稍退切忌再補詳見前虛後實補後虛證不退及加變證者危下後虛證不見乃臆度其虛輒用補劑法所大忌凡用補劑本日不見佳處即非應補蓋人參為益元氣之極品開胃氣之神丹下咽之後其效立見若用參之後元氣不回胃氣不轉者勿謂人參之功不捷蓋因投之不當耳急宜另作主張若恣意投之必加變證如加而更投之者死論陰證世間罕有傷寒陰陽二證方書皆以對待言之凡論陽證即繼之陰證讀者以為陰陽二證世間均有之病所以臨診之際先將陰陽二證在於胸次往來惆𭞭最易牽入誤揣甚有不辨脈證但窺其人多蓄少艾或適在妓家或房事後得病或病適至行房醫問及此便疑為陰證殊不知病之將至雖僧尼寡婦室女童男曠夫閹宦病勢不可遏與房欲何與焉即便多蓄少艾頻宿娼妓房事後適病病適至行房此際偶值病邪發行膜原氣壅火鬱未免發熱到底終是陽證與陰證何與焉況又不知陰證實乃世間非常有之證而陽證似陰者何日無之究其所以然者蓋不論傷寒溫疫傳入胃家陽氣內郁不能外布即便四逆所謂陽厥是也又曰厥微熱亦微厥深熱亦深其厥深者甚至冷過肘膝脈沉而微劇則通身冰冷脈微欲絶雖有輕重之分總之為陽厥因其觸目皆是苟不得其要領於是誤認者良多況且溫疫每類傷寒又不得要領最易混淆夫溫疫熱病也從無感寒陰自何來一也治溫疫數百人才遇二三正傷寒二也及治正傷寒數百人才遇二三真陰證三也前後統論苟非歷治多人焉能一見陰證豈世間常有之病耶觀今傷寒科盛行之醫歷數年間或者得遇一真陰證者有之又何必才見傷寒便疑陰證況多溫疫又非傷寒者乎論陽證似陰凡陽厥手足厥冷或冷過肘膝甚至手足指甲皆青黑劇則遍身冰冷如石血凝青紫成片或六脈無力或脈微欲絶以上脈證悉見純陰猶以為陽證何也及審內證氣噴如火齦爛口臭煩渴譫語口燥舌乾舌苔黃黑或生芒刺心腹痞滿小腹疼痛小便赤色涓滴作痛非大便燥結即大腸膠閉非協熱下利即熱結旁流以上內三焦悉見陽證所以為陽厥也粗工不察內多下證但見表證脈體純陰誤投溫劑禍不旋踵凡陽證似陰者溫疫與正傷寒通有之其有陰證似陽者此係正傷寒家事在溫疫無有此證故不附載詳見傷寒實録溫疫陽證似陰者始必由膜原以漸傳裡先幾日發熱以後四逆傷寒陽證似陰者始必由陽經發熱脈浮而數邪氣自外漸次傳裡裡氣壅閉脈體方沉乃至四肢厥逆蓋非一日矣其真陰者始則惡寒而不發熱其脈沉細當即四逆急投附子回陽二三日失治即死捷要辨法凡陽證似陰外寒而內必熱故小便血赤凡陰證似陽者格陽之證也上熱下寒故小便清白但以小便赤白為據以此推之萬不失一舍病治藥嘗遇微疫醫者誤進白虎湯數劑續得四肢厥逆脈勢轉劇更醫謬指為陰證投附子湯病愈此非治病實治藥也雖誤認病原藥則偶中醫者之庸病者之福也蓋病本不藥自愈之證因連進白虎寒涼慓悍抑遏胃氣以致四肢厥逆疫邪強伏故病增劇今投溫劑胃氣通行微邪流散故愈若果直中無陽陰證誤投白虎一劑立斃豈容數劑耶舍病治弊一人感疫發熱煩渴思飲冰水醫者以為凡病須忌生冷禁止甚嚴病者苦索勿與遂致兩目火迸咽喉焦燥不時煙焰上騰晝夜不寐目中見鬼無數病劇苦甚自謂但得冷飲一滴下咽雖死無恨於是乘隙匍匐竊取井水一盆置之枕旁飲一杯目頓清亮二杯鬼物潛消三杯咽喉聲出四杯筋骨舒暢飲至六杯不知盞落枕旁竟爾熟睡俄而大汗如雨衣被濕透脫然而愈蓋因其人瘦而多火素稟陽臟始則加之以熱經絡枯燥既而邪氣傳表不能作正汗而解誤投升散則病轉劇今得冷飲表裡和潤所謂除弊便是興利自然汗解宜矣更有因食因痰因寒劑而致虛陷疾不愈者皆當舍病求弊以此類推可以應變於無窮矣論輕疫誤治每成痼疾凡客邪皆有輕重之分惟疫邪感受輕者人所不識往往誤治而成痼疾假令患痢晝夜無度水穀不進人皆知其危痢也其有感之輕者晝夜雖行四五度飲食如常起居如故人亦知其輕痢未嘗誤以他病治之者憑有積滯耳至如溫疫感之重者身熱如火頭疼身痛胸腹脹滿苔刺譫語斑黃狂躁人皆知其危疫也其有感之淺者微有頭疼身痛午後稍有潮熱飲食不甚減但食後或覺脹滿或覺噁心脈微數如是之疫最易誤認即醫家素以傷寒溫疫為大病今因證候不顯多有不覺其為疫也且人感疫之際來而不覺既感不知最無憑據又因所感之氣薄今發時故現證不甚雖有頭疼身痛況飲食不絶力可徒步又焉得而知其疫也病人無處追求每每妄訴病原醫家不善審察未免隨情錯認有如病前適遇小勞病人不過以此道其根由醫家不辨是非便引東垣勞倦傷脾元氣下陷乃執甘溫除大熱之句隨用補中益氣湯壅補其邪轉壅轉熱轉熱轉瘦轉瘦轉補多至危殆或有婦人患此適逢産後醫家便認為陰虛發熱血虛發痛遂投四物湯及地黃丸泥滯其邪遷延日久病邪益固邀遍女科無出滋陰養血屢投不效復更涼血通瘀不知原邪仍在積熱自是不除日漸尪羸終成廢痿凡人未免七情勞郁醫者不知為疫乃引丹溪五火相扇之説或指為心火上炎或指為肝火衝擊乃惟類聚寒涼冀其直折而反凝泣其邪徒傷胃氣疫邪不去瘀熱何清延至骨立而斃或尚有宿病淹纏適逢微疫未免身痛發熱醫家病家同認為原病加重仍用前藥加減有妨於疫病益加重至死不覺者如是種種難以盡述聊舉一二推而廣之可以應變於無窮矣肢體浮腫時疫潮熱而渴舌黃身痛心下滿悶腹時痛脈數此應下之症也外有通身及面目浮腫喘急不已小便不利此疫兼水腫因三焦壅閉水道不行也但治在疫水腫自已宜小承氣湯向有單腹脹而後疫者治在疫若先年曾患水腫因疫而發者治在疫水腫自愈病人通身浮腫下體益甚臍凸陰囊及陰莖腫大色白小便不利此水腫也繼又身大熱午後益甚煩渴心下滿悶喘急大便不調此又加疫也因下之下後脹不除反加腹滿宜承氣加甘遂二分弱人量減蓋先腫脹續得時疫此水腫兼疫大水在表微疫在裡也故並治之時疫愈後數日先自足浮腫小便不利腫漸至心腹而喘此水氣也宜治在水時疫愈後數日先自足浮腫小便如常雖至通身浮腫而不喘別無所苦此氣復也蓋血乃氣之依歸夫氣先血而生無所歸依故暫浮腫但靜養節飲食不藥自愈時疫身體羸弱言不足以聽氣不足以息得下證少與承氣下證稍減更與之眩暈欲死蓋不勝其攻也絶谷期月稍補則心腹滿悶攻不可補不可守之則元氣不鼓餘邪沉匿膜原日惟水飲而已以後心腹忽加腫滿煩冤者向來沉匿之邪方悉分傳於表裡也宜承氣養榮湯一服病已設表腫未除宜微汗之自愈時疫得里證失下以致面目浮腫及肢體微腫小便自利此表裡氣滯非兼水腫也宜承氣下之裡氣一疏表氣亦順浮腫頓除或見絶谷期月指為脾虛發腫誤補必劇妊娠更多此證治法同前則子母俱安但當少與慎無過劑共七法服寒劑反熱陽氣通行溫養百骸陽氣壅閉鬱而為熱且夫人身之火無處不有無時不在但喜通達耳不論臟腑經絡表裡上下血分氣分一有所阻即便發熱是知百病發熱皆由於壅鬱然火鬱而又根於氣氣常靈而火不靈火不能自運賴氣為之運所以氣升火亦升氣降火亦降氣行火亦行氣若阻滯而火屈曲惟是屈曲熱斯發矣是氣為火之舟楫也今疫邪透出於膜原氣為之阻時欲到胃是求伸而未能遽達也今投寒劑抑遏胃氣氣益不伸火更屈曲所以反熱也往往服芩連知柏之類病人自覺反熱其間偶有靈變者但言我非黃連證亦不知其何故也切謂醫家終以寒涼清熱熱不能清竟置弗疑服之反熱全然不悟雖至白首終不究心悲夫知一邪之著人如飲酒然凡人醉酒脈必洪而數氣高身熱面目俱赤乃其常也及言其變各有不同有醉後妄言妄動醒後全然不知者有雖沉醉而神思終不亂者醉後應面赤而反刮白者應痿弱而反剛強者應壯熱而反惡寒戰栗者有易醉而易醒者有難醉而難醒者有發呵欠及嚏噴者有頭眩眼花及頭痛者因其氣血虛實之不同臟腑稟賦之各異更兼過飲少飲之別考其情狀各自不同至論醉酒一也及醒一時諸態如失凡人受邪始則晝夜發熱日晡益甚頭疼身痛舌上白苔漸加煩渴乃衆人之常也及言其變各自不同者或嘔或吐或咽喉乾燥或痰涎湧甚或純純發熱或發熱而兼凜凜或先凜凜而後發熱或先惡寒而後發熱或先一日惡寒而後發熱以後即純純發熱或先惡寒而後發熱以後漸漸寒少而熱多以至純熱者或晝夜發熱者或但潮熱余時熱稍緩者有從外解者或戰汗或狂汗自汗盜汗或發斑有潛消者有從內傳者或胸膈痞悶或心腹脹滿或心痛腹痛或胸脅痛或大便不通或前後癃閉或協熱下利或熱結旁流有黃苔黑苔者有口燥舌裂者有舌生芒刺舌色紫赤者有鼻孔如煙煤之黑者有發黃及蓄血吐血衄血大小便血汗血嗽血齒衄血有發頤疙瘩瘡者有首尾能食者有絶谷一兩月者有無故最善反復者有愈後漸加飲食如舊者有愈後飲食勝常二三倍者有愈後退爪脫髮者至論惡證口噤不能張昏迷不識人足屈不能伸唇口不住牽動手足不住振戰直視上視圓睜目瞑口張聲啞舌強遺尿遺糞項強發痙手足俱痙筋惕肉瞤循衣摸床撮空理線等證種種不同因其氣血虛實之不同臟腑稟賦之有異更兼感重感輕之別考其證候各自不同至論受邪則一也及邪盡一任諸症如失所謂知其一萬事畢知其要者一言而終不知其要者流散無窮此之謂也以上止舉一氣因人而變至有歲氣稍有不同者有其年衆人皆從自汗而解者更有其年衆人皆從戰汗而解者此又因氣而變餘證大同小異皆疫氣也至又雜氣為病一氣自成一病每病各又因人而變統而言之其變不可勝言矣醫者能通其變方為盡善四損不可正治凡人大勞大欲及大病久病後氣血兩虛陰陽並竭名為四損當此之際忽又加疫邪氣雖輕併為難治以正氣先虧邪氣自陷故諺有云傷寒偏死下虛人正謂此也蓋正氣不勝者氣不足以息言不足以聽或欲言而不能感邪雖重反無脹滿痞塞之證誤用承氣不劇即死以正氣愈損邪氣愈伏也若真血不足者面色萎黃唇口刮白或因吐血崩漏或因産後亡血過多或因腸風臟毒所致感邪雖重面目反無陽色誤用承氣速死以營血愈消邪氣益加沉匿也若真陽不足者或四肢厥逆或下利清穀肌體惡寒恆多泄瀉至夜益甚或口鼻冷氣感邪雖重反無發熱燥渴苔刺等證誤用承氣陽氣愈消陰凝不化邪氣留而不行輕則漸加萎頓重則下咽立斃若真陰不足者自然五液乾枯肌膚甲錯感邪雖重應汗無汗應厥不厥誤用承氣病益加重以津液枯涸邪氣澀滯無能輸泄也凡遇此等不可以常法正治當從其損而調之調之不愈者稍以常法治之治之不及者損之至也是故一損二損輕者或可挽回重者治之無益乃至三損四損雖盧扁亦無所施矣更以老少參之少年遇損或可調治老年遇損多見治之不及者以枯魄獨存化源已絶不復滋生也勞復食復自復疫邪已退脈證俱平但元氣未復或因梳洗沐浴或因多言妄動遂致發熱前證復起惟脈不沉實為辨此為勞復蓋氣為火之舟楫今則真氣方長勞而復折真氣既虧火亦不前如人欲濟舟楫已壞其可渡乎是火也某經氣陷則火隨陷於某經陷於經絡則為表熱陷於臟腑則為裡熱虛甚熱甚虛微熱微治法輕則靜養可復重則大補氣血候真氣一回血脈融和表裡通暢所陷之火隨氣輸泄自然熱退而前證自除矣若誤用承氣及寒涼剝削之劑變證蜂起卒至殞命宜服安神養血湯若因飲食所傷者或吞酸作噯或心腹滿悶而加熱者此名食復輕則損谷自愈重則消導方愈若無故自復者以伏邪未盡此名自復當問前得某證所發亦某證稍與前藥以徹其餘邪自然獲愈安神養血湯茯神棗仁當歸遠志桔梗芍藥地黃陳皮甘草加龍眼肉水煎服感冒兼疫疫邪伏而未發因感冒風寒觸動疫邪相繼而發也既有感冒之因由復有風寒之脈證先投發散一汗而解一二日續得頭疼身痛潮熱煩渴不惡寒此風寒去疫邪發也以疫法治之瘧疫兼證瘧疾二三發或七八發後忽然晝夜發熱煩渴不惡寒舌生苔刺心腹痞滿飲食不進下證漸具此溫疫著瘧疾隱也以疫法治之溫疫晝夜純熱心腹痞滿飲食不進下後脈靜身涼或間日或每日時惡寒而後發熱如期者此溫疫解瘧邪未盡也以瘧法治之溫瘧凡瘧者寒熱如期而發余時脈靜身涼此常瘧也以瘧法治之設傳胃者必現里證名為溫瘧以疫法治者生以瘧法治者死里證者下證也下后里證除寒熱獨存者是溫疫減瘧證在也瘧邪未去者宜疏邪去而瘧勢在者宜截勢在而挾虛者宜補疏以清脾飲截以不二飲補以四君子方見瘧門仍恐雜亂此不附載疫痢兼證下痢膿血更加發熱而渴心腹痞滿嘔而不食此疫痢兼證最為危急夫疫者胃家事也蓋疫邪傳胃十常八九既傳入胃必從下解疫邪不能自出必藉大腸之氣傳送而下而疫方愈夫痢者大腸內事也大腸既病失其傳送之職故正糞不行純乎下痢膿血而已所以向來穀食停積在胃直須大腸邪氣將退胃氣通行正糞自此而下今大腸失職正糞尚自不行又何能與胃載毒而出毒既不前羈留在胃最能敗壞真氣在胃一日有一日之害一時有一時之害耗氣搏血神脫氣盡而死凡遇疫痢兼證者在痢尤為吃緊疫痢俱急者宜檳芍順氣湯誠為一舉兩得檳芍順氣湯專治下痢頻數裡急後重兼舌苔黃得疫之裡證者檳榔芍藥枳實厚朴大黃生薑煎服婦人時疫婦人傷寒時疫與男子無二惟經水適斷適來及崩漏産後與男子稍有不同夫經水之來乃諸經血滿歸注於血室下泄為月水血室者一名血海即衝任脈也為諸經之總任經水適來疫邪不入於胃乘勢入於血室故夜發熱譫語蓋衛氣晝行於陽不與陰爭故晝則明瞭夜行於陰與邪相搏故夜則發熱譫語至夜止發熱而不譫語者亦為熱入血室因有輕重之分不必拘於譫語也經曰無犯胃氣及上二焦必自愈胸膈並胃無邪勿以譫語為胃實而妄攻之但熱隨血下故自愈若有如結胸狀者血因邪結也當刺期門以通其結治之以柴胡湯治之不若刺者功捷經水適斷血室空虛其邪乘虛傳入邪勝正虧經氣不振不能鼓散其邪為難治且不從血泄邪氣何由即解與適來之義有血虛血實之分宜柴胡養榮湯新産後亡血過多衝任空虛與夫素善崩漏經氣久虛皆能受邪與經水適斷同法妊娠時疫孕婦時疫設應用三承氣湯須隨證施治切不可過慮慎毋惑於參術安胎之説病家見用承氣先自驚疑或更左右嘈雜必致醫家掣肘為子母大不祥若應下之證反用補劑邪火壅鬱熱毒愈熾胎愈不安轉氣傳血胞胎何賴是以古人有懸鐘之喻梁腐而鍾未有不落者惟用承氣逐去其邪火毒消散炎熇頓為清涼氣回而胎自固當此證候反見大黃為安胎之聖藥歷治歷當子母俱安若腹痛如錐腰痛如折此時未墮欲墮之候服藥亦無及矣雖投承氣但可愈疾而全母昧者以為胎墮必反咎於醫也或詰余曰孕婦而投承氣設邪未逐先損其胎當如之何余曰結糞瘀熱腸胃間事也胎附於脊腸胃之外子宮內事也藥先到胃瘀熱才通胎氣便得舒養是以興利除害於頃刻之間何慮之有但毒藥治病衰去七八餘邪自愈慎勿過劑耳凡孕娠時疫萬一有四損者不可正治當從其損而調之産後同法非其損而誤補必死四損詳見前應補諸證條後小兒時疫凡小兒感冒風寒瘧痢等證人所易知一染時疫人所難窺所以耽誤者良多何也蓋由幼科專於痘疹吐瀉驚疳並諸雜證在傷寒時疫甚略之一也古人稱幼科為啞科蓋不能盡罄所苦以告師師又安能悉乎問切之義所以但知其身熱不知其頭疼身痛也但知不思乳食心胸膨脹疑其內傷乳食安知其疫邪傳胃也但見嘔吐噁心口渴下利以小兒吐瀉為常事又安知其協熱下痢也凡此何暇致思為時疫二也小兒神氣嬌怯筋骨柔脆一染時疫延挨失治即便二目上吊不時驚搐肢體發痙十指鉤曲甚則角弓反張必延幼科正合渠平日學習見聞之證是多誤認為慢驚風遂投抱龍丸安神丸竭盡驚風之劑轉治轉劇因見不啼不語又將神門眉心亂灸艾火雖微內攻甚急兩陽相拂如火加油紅爐添炭死者不可勝記深為痛憫今凡遇疫毒流行大人可染小兒豈獨不可染耶但所受之邪則一因其氣血筋骨柔脆故所現之症為異耳務宜求邪以治故用藥與大人倣佛凡五六歲以上者藥當減半二三歲往來者四分之一可也又腸胃柔脆少有差誤為禍更速臨證尤宜加慎小兒太極丸天竺黃五錢膽星五錢大黃三錢麝香三分冰片三分殭蠶三錢上為細末端午日午時修合糯米飯杵為丸如芡實大硃砂為衣凡遇疫證薑湯化下一丸神效主客交凡人向有他病尪羸或久瘧或內傷瘀血或吐血便血咳血男子遺精白濁精氣枯涸女人崩漏帶下血枯經閉之類以致肌肉消爍邪火獨存故脈近於數也此際稍感疫氣醫家病家見其穀食暴絶更加胸膈痞悶身疼發熱徹夜不寐指為原病加重誤以絶谷為脾虛以身痛為血虛以不寐為神虛遂投參朮歸地茯神棗仁之類愈進愈危知者稍以疫法治之發熱減半不時得睡穀食稍進但數脈不去肢體時疼胸脅錐痛過期不愈醫以雜藥頻試補之則邪火愈熾瀉之則損脾壞胃滋之則膠邪愈固散之則經絡益虛疏之則精氣愈耗守之則日消近死蓋但知其伏邪已潰表裡分傳里證雖除不知正氣衰微不能托出表邪留而不去因與血脈合而為一結為痼疾也肢體時疼者邪與榮氣搏也脈數身熱不去者邪火併郁也脅下錐痛者火邪結於膜膈也過期不愈者凡疫邪交卸近在一七遠在二七甚至三七過此不愈者因非其治不為壞證即為痼疾也夫痼疾者所謂客邪膠固於血脈主客交渾最難得解且愈久益固治法當乘其大肉未消真元未敗急用三甲散多有得生者更附加減法隨其素而調之三甲散鱉甲龜甲並用酥炙黃為末各一錢如無酥各以醋炙代之穿山甲土炒黃為末五分蟬蛻洗淨炙乾五分殭蠶白硬者切斷生用五分牡蠣煅為末五分咽燥者斟酌用蟅蟲三個乾者擘碎鮮者搗爛和酒少許取汁入湯藥同服其渣入諸藥同煎白芍藥酒炒七分當歸五分甘草三分水二鍾煎八分瀝渣溫服若素有老瘧或疸瘧者加牛膝一錢何首烏一錢胃弱欲作瀉者宜九蒸九曬若素有郁痰者加貝母一錢有老痰者加栝蔞霜五分善嘔者勿用若咽乾作癢者加花粉知母各五分若素燥咳者加杏仁搗爛一錢五分若素有內傷瘀血者倍蟅蟲如無蟅蟲以乾漆炒煙盡為度研末五分及桃仁搗爛一錢代之服後病減半勿服當盡調理法調理法凡人胃氣強盛可飢可飽若久病之後胃氣薄弱最難調理蓋胃體如灶胃氣如火穀食如薪合水穀之精微升散為血脈者如焰其糟粕下轉為糞者如燼是以灶大則薪多火盛薪斷而余焰猶存雖薪從續而火亦燃若些小鐺鍋正宜薪數莖稍多則壅滅稍斷則火絶死灰而求復燃不亦難乎若夫大病之後蓋客邪新去胃口方開幾微之氣所以多與早與遲與皆不可也宜先與粥飲次糊飲次糜粥次軟飯尤當循序漸進毋先後其時當設爐火晝夜勿令斷絶以備不時之用思谷即與稍緩則胃飢如剡再緩則胃氣傷反不思食矣既不思食若照前與之雖食而弗化弗化則傷之又傷不為食復者當如初進法若更多與及黏硬之物胃氣壅甚必脹滿難支若氣絶谷存乃致反覆顛倒形神俱脫而死矣統論疫有九傳治法夫疫之傳有九然亦不出乎表裡之間而已矣所謂九傳者病人各得其一非謂一病而有九傳也蓋溫疫之來邪自口鼻而入感於膜原伏而未發者不知不覺已發之後漸加發熱脈洪而數此衆人相同宜達原飲疏之繼而邪氣一離膜原察其傳變衆人不同者以其表裡各異耳有但表而不里者有但里而不表者有表而再表者有里而再里者有表裡分傳者有表裡分傳而再分傳者有表勝於里者有里勝於表者有先表而後里者有先里而後表者凡此九傳其去病一也醫者不知九傳之法不知邪之所在如盲者之不任杖聾者之聽宮商無音可求無路可適未免當汗不汗當下不下或顛倒誤用或尋枝摘葉但治其證不治其邪同歸於誤一也所言但表而不里者其證頭疼身痛發熱而復凜凜內無胸滿腹脹等證穀食不絶不煩不渴此邪氣外傳由肌表而出或自斑消或從汗解斑者有斑疹桃花斑紫雲斑汗者有自汗盜汗狂汗戰汗之異此病氣之使然不必較論但求得斑得汗為愈疾耳凡自外傳者為順勿藥亦能自愈間有汗出不徹而熱不退者宜白虎湯斑出不透而熱不退者宜舉斑湯有斑汗並行而愈者若斑出不透汗出不徹而熱不除者宜白虎合舉斑湯間有表而再表者所發未盡膜原尚有隱伏之邪或二三日後四五日後依前發熱脈洪而數及其解也斑者仍斑汗者仍汗而愈未愈者仍如前法治之然亦希有至於三表者更希有也若但里而不表者外無頭疼身痛而後亦無三斑四汗惟胸膈痞悶欲吐不吐雖得少吐而不快此邪傳裡之上者宜瓜蒂散吐之邪從其減邪盡病已邪傳裡之中下者心腹脹滿不嘔不吐或燥結便閉或熱結旁流或協熱下利或大腸膠閉並宜承氣輩導去其邪邪減病減邪盡病已上中下皆病者不可吐吐之為逆但宜承氣導之則在上之邪順流而下嘔吐立止脹滿漸除有里而再里者愈後二三日或四五日依前之證復發在上者仍吐之在下者仍下之再里者常事甚有三里者希有也雖有上中下之分皆為里證若表裡分傳者始則邪氣伏於膜原膜原者即半表半裡也此傳法以邪氣平分半入於裡則現里證半出於表則現表證此疫家之常事然表裡俱病內外壅閉既不得汗而復不得下此不可汗強求其汗必不可得宜承氣先通其里里邪先去邪去則裡氣通中氣方能達表嚮者鬱於肌肉之邪乘勢盡發於肌表矣或斑或吐蓋隨其性而升泄之也諸證悉去既無表裡證而熱不退者膜原尚有已發之邪未盡也宜三消飲調之若表裡分傳而再分傳者照前表裡俱病宜三消飲復下復汗如前而愈此亦常事至有三發者亦希有也若表勝於里者膜原伏邪發時傳表之邪多傳裡之邪少何以治之表證多而里證少當治其表里證兼之若里證多而表證少者但治其里表證自愈若先表而後里者始則但有表證而無里證宜達原飲有經證者當用三陽加法經證不顯但發熱者不用加法繼而脈洪大而數自汗而渴邪離膜原未能出表耳宜白虎湯辛涼解散邪從汗解脈靜身涼而愈愈後二三日後或四五日後依前發熱宜達原飲至後反加胸滿腹脹不思穀食煩渴舌上苔刺等證加大黃微利之久而不去在上者宜瓜蒂散吐之如在下者宜承氣湯導之若先里而後表者始則發熱漸加里證下之裡證除二三日內復發熱反加頭疼身痛脈浮者宜白虎湯若下後熱減不甚三四日後精神不慧脈浮者宜白虎湯汗之服湯後不得汗者因精液枯竭也加人參覆臥則汗解此近表裡分傳之證不在此例若大下後大汗後表裡之證悉去繼而一身盡痛身如被杖甚則不可反側周身骨寒而痛非表證也此不必治二三日內陽氣自回身痛自愈凡疫邪再表再里或再表裡分傳者醫家不解反責病家不善調理以致反復病家不解每責醫家用藥有誤致病復起彼此歸咎胥失之矣殊不知病勢之所當然蓋氣性如此一者不可為二二者不可為一絶非醫家病家之過也但得病者向賴精神完固雖再三反復隨復隨治隨治隨愈間有延挨失治或治之不得其法日久不除精神耗竭嗣後更醫投藥固當現在之邪拔去因而得效殊不知膜原尚有伏邪在一二日內前證復起反加循衣摸床神思昏憒目中不了了等證且脈起漸委大凶之兆也譬如行人日間趲行未晚投宿何等從容今則日間繞道日暮途長急難及矣病家不咎於前醫耽誤時日反咎於後醫既生之而又殺之良可嘆也當此之際攻之則元氣幾微是求速死補之則邪火益熾精氣枯燥守之則正不勝邪必無生理矣正名傷寒論曰發熱而渴不惡寒者為溫病後人省水加疒為瘟即溫也如病證之證後人省文作證嗣後省言加疒為症又如滯下古人為下利膿血蓋以瀉為下利後人加疒為痢要之古無瘟痢症三字皆後人之自為變易耳不可因易其文以溫瘟為兩病各指受病之原乃指冬之伏寒至春至夏發為溫熱又以非節之暖為溫疫果爾又當異證異脈不然臨治之際何以知受病之原不同也設使脈病不同病原各異又當另立方論治法然則脈證治法又何立哉所謂枝節愈繁而意愈亂學者未免有多岐之惑矣夫溫者熱之始熱者溫之終溫熱首尾一體故又為熱病即溫病也又名疫者以其延門闔戶如徭役之役衆人均等之謂也今省文作殳加疒為疫又為時疫時氣者因其感時行戾氣所發也因其惡厲又為之疫癘終有得汗而解故燕冀名為汗病此外又有風溫濕溫即溫病挾外感之兼證名各不同究其病則一然近世稱疫者衆書以溫疫者弗遺其言也後以傷寒例及諸家所議凡有關於溫疫其中多有誤者恐致惑於來學悉採以正焉傷寒例正誤陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣皆能為病以傷寒為毒者以其最成殺厲之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也成注內經曰先夏至為溫病後夏至為暑病溫暑之病本於傷寒而得之正誤按十二經絡與夫奇經八脈無非營衛氣血周布一身而營養百骸是以天真元氣無往不在不在則麻木不仁造化之機無刻不運不運則顛倒僕絶然風寒暑濕之邪與吾身之營衛勢不兩立一有所幹疾苦作矣苟或不除不危即斃上文所言冬時嚴寒所傷中而即病者為傷寒不即病者至春變為溫病至夏變為暑病然風寒所傷輕則感冒重則傷寒即感冒一證風寒所傷之最輕者尚爾頭疼身痛四肢拘急鼻塞聲重痰嗽喘急惡寒發熱當即為病不能容隱今冬時嚴寒所傷非細事也反能藏伏過時而發耶更問何等中而即病何等中而不即病何等中而即病者頭痛如破身痛如杖惡寒項強發熱如炙或喘或嘔甚則發痙六脈疾數煩躁不寧至後傳變不可勝言倉卒失治乃致傷生何等中而不即病者感則一毫不覺既而延至春夏當其已中之後未發之前飲食起居如常神色聲氣纖毫不異其已發之證勢不減於傷寒況風寒所傷未有不由肌表而入所傷皆營衛所感均系風寒一者何其懞懵中而不覺藏而不知一者何其靈異感而即發發而根屬同源而異流天壤之隔豈無説耶既無其説則知溫熱之原非風寒所中矣且言寒毒藏於肌膚之間肌為肌表膚為皮之淺者其間一毫一竅無非營衛經行所攝之地即感冒些小風寒尚不能稽留當即為病何況受嚴寒殺厲之氣且感於皮膚最淺之處反能容隱者耶以此推之必無是事矣凡治客邪大法要在表裡分明所謂未入於腑者邪在經也可汗而已既入於腑者邪在裡也可下而已果系寒毒藏於肌膚雖過時而發邪氣猶然在表治法不無發散邪從汗解後世治溫熱病者若執肌膚在表之邪一投發散是非徒無益而又害之矣凡病先有病因方有病證因證相參然後始有病名稽之以脈而後可以言治假令傷寒中暑各以病邪而立名今熱病以病證而立名上文所言暑病反不若言熱病者尚可模糊若以暑病為名暑為病邪非感盛夏之暑不可以言暑病若言暑病乃是香薷飲之證彼此豈可相混凡客病感邪之重則病甚其熱亦甚感邪之輕則病輕其熱亦微熱之微甚存乎感邪之輕重也二三月及八九月其時亦有病重大熱不止失治而死者五六月亦有病輕熱微不藥而愈者凡溫病四時皆有但仲夏感者多春秋次之冬時又次之但可以時令分病之多寡不可以時令分熱之輕重也是以辛苦之人春夏多溫熱病者皆由冬時觸寒所致非時行之氣也凡時行者春應暖而反大寒夏應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時有其氣是以一歲之中長幼之病多相似者此則時行之氣也然氣候亦有應至而不至或有至而太過者或未應至而至者此成病氣也正誤春溫夏熱秋涼冬寒乃四時之常因風雨陰晴稍為損益假令春應暖而反多寒其時必多雨秋應涼而熱不去者此際必多晴夫陰晴旱潦之不測寒暑損益安可以為拘此天地四時之常事未必為疫夫疫者感天地之戾氣也戾氣者非寒非暑非暖非涼亦非四時交錯之氣乃天地別有一種戾氣多見於兵荒之歲間歲亦有之但不甚耳上文所言長幼之病多相似者此則為時行之氣雖不言疫疫之意寓是矣蓋緣不知戾氣為交錯之氣而為疫殊不知四時之氣雖損益於其間及其所感之病終不離其本源假令正二月應暖偶因風雨交集天氣不能溫暖而多春寒所感之病輕則為感冒重則為傷寒原從感冒傷寒法治之但春寒之氣終不若冬時嚴寒殺厲之氣為重投劑不無有輕重之分此即應至而不至至而不去二事也又如八九月適多風雨偶有暴寒之氣先至所感之病大約與春寒倣佛深秋之寒終不若冬時殺厲之氣為重此即未應至而至即冬時嚴寒倍常是為至而太過所感亦不過即病之傷寒耳假令夏時多風雨炎威少息為至而不及時多亢旱爍石流金為至而太過太過則病甚不及則病微至於傷暑一也其病與四時正氣之序何異耶治法無出於香薷飲而已其冬時有非節之暖名曰冬溫正誤此即未應至而至也按冬傷於寒至春變為溫病今又以冬時非節之暖為冬溫一感於冬寒一感於冬溫一病兩名寒溫懸絶然則脈證治法又何似耶夫四氣乃二氣之離合也二氣即一氣之升降也升極則降降極則升升降之極為陰陽離離則亢亢氣致病亢氣者冬之大寒夏之大暑也將升不升將降不降為陰陽合合則氣和氣和則不致病和氣者即春之溫暖秋之清涼也是以陰極而陽氣來和為溫暖陽極而陰氣來和為清涼斯有既濟之道焉易曰一陰一陽為之道偏陰偏陽為之疾得其道未有反致其疾者若夫春寒秋熱為冬夏之偏氣倘有觸冒之者固可以為疾亦無出於感寒傷暑未可以言疫若夏涼冬暖轉得春秋之和氣豈有因其和而反致疾者所以但見傷寒中暑未嘗見傷溫和而中清涼也溫暖清涼未必為病又烏可以言疫從春分以後至秋分節天有暴寒者此皆時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五六月陽氣已盛為寒所折病熱為重七八月陽氣已衰為寒所折病熱亦微其病與溫暑相似但有殊耳正誤按四時皆有暴寒但冬時感嚴寒殺厲之氣名傷寒為病最重其餘三時寒微為病亦微又以三時較之盛夏偶有些小風寒所感之病更微矣此則以感寒之重病亦重而熱亦重感寒之輕病亦輕而熱亦輕是重於冬而略於三時至夏而又略之此必然之理也上文所言三四月陽氣尚弱為寒所折病熱猶輕五六月以其時陽氣已盛為寒所折病熱為重七八月其時陽氣已衰為寒所折病熱亦微由是言之在冬時陽氣潛藏為寒所折病熱更微此則反見夏時感寒為重冬時感寒為輕前後矛盾於理大違交春夏秋三時偶有暴寒所著與冬時感冒相同治法無二但可名感冒不當另立寒疫之名若又以疫為名殊類畫蛇添足諸家溫疫正誤云岐子傷寒汗下不愈過經其證尚在而不除者亦為溫疫病也如太陽證汗下過經不愈診得尺寸俱浮者太陽溫病也如身熱目痛不眠汗下過經不愈診得尺寸俱長者陽明溫病也如胸脅脹滿汗下過經不愈診得尺寸俱弦者少陽溫病也如腹滿咽乾診得尺寸俱沉細過經不愈者太陰溫病也如口燥舌乾而渴診得尺寸俱沉細過經不愈者少陰溫病也如煩滿囊縮診得尺寸俱微緩過經不愈者厥陰溫病也是故隨其經而取之隨其證而治之如發斑乃溫毒也正誤按傷寒敘一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰為傳經盡七日後傳太陽為過經云岐子所言傷寒過經不愈者便指為溫病竟不知傷寒溫病自是兩途未有始傷寒而終變為溫病者若果溫病自內達外何有傳經若能傳經即是傷寒而非溫病明矣注云愚謂溫與熱有輕重之分故仲景云若遇溫氣則為溫病此叔和之言非仲景論更遇溫熱氣即為溫毒熱比溫尤重故也但冬傷於寒至春而發不感異氣名曰溫病此病之稍輕者也溫病未已更遇溫氣變為溫病此病之稍重者也傷寒例以再遇溫氣名曰溫疫又有不因冬傷於寒至春而病溫者此特感春溫之氣可名春溫如冬之傷寒秋之傷濕夏之中暑相同也按陰陽大論四時正氣之序春溫夏暑秋涼冬寒今特感春溫之氣可名春溫若感秋涼之氣可名秋涼病矣春溫可以為溫病秋涼獨不可為涼病乎以涼病似覺難言勉以濕證搪塞既知秋涼病有礙反而思之則知春溫病殊為謬妄矣以此觀之是春之溫病有三種不同有冬傷於寒至春變為溫病者有溫病未已再遇溫氣而為溫病者有重感溫氣相雜而為溫病者有不因冬傷於寒不因更遇溫氣只於春時感春溫之氣而病者若此三者皆可名為溫病不必各立名色只要知其病原之不同也正誤凡病各有病因如傷寒自覺觸冒風寒如傷食自覺飲食過度各有所責至於溫病乃伏邪所發多有安居靜養別無他故倏焉而病詢其所以然之故無處尋思況求感受之際且自不覺故立論者或言冬時非節之暖或言春之溫氣或言傷寒過經不解或言冬時伏寒至春夏乃發按冬傷於寒春必病溫出自素問此漢人所撰晉王叔和又以述傷寒例蓋順文之誤也或指冬不藏精春必病溫此亦漢人所撰但言斫喪致病不言因邪致病即使寓意邪氣乘虛實不言何氣使然夫邪氣乘虛最是切當然又有童男室女以無漏之體富貴享逸以幽間之志在疫亦未能免事有不可執滯又見冬時之溫病與春夏之溫疫脈證相同治法無異據云冬時即病為傷寒今發於冬時應作正傷寒且又實是溫病既是溫病當發於春夏而何又發於冬時思之至此不能無疑乃覺前人所論難憑務求其所以然之故既不可言傷寒又不可言伏寒即得以冬時非節之暖牽合而為病原不思嚴寒酷暑因其鋒利人所易犯故為病最重至於溫暖乃天地中和之氣萬物得之而發育氣血得之而融和當其肅殺之令權施仁政未有因其仁政而反蒙其害者竊嘗較之冬時未嘗溫暖亦有溫病或遇隆冬暫時溫暖雖有溫病感溫之由亦無確據此不過猜疑之説烏足以為定論或言感三春當令之溫氣為溫病夫春時自應溫暖責之尤其無謂或言溫病復感溫氣而為溫病正如頭上安頭或言傷寒汗下過經不愈者為溫病則又指鹿為馬活人又以夏應暑而寒氣折之責邪在心為夏溫秋應涼而大熱折之責邪在肺為秋溫轉屬支離陶氏又以秋感溫氣而為秋溫明是雜證敘溫者絡繹議論者各別言愈繁雜而本源愈失使學者反增亡羊之感與醫道何補活人書云夏月發熱惡寒頭疼身體肢節痛重其脈洪盛者熱也冬傷於寒因暑氣而發為熱病治熱病與傷寒同有汗宜桂枝湯無汗宜麻黃湯如煩躁宜大青龍湯然夏月藥性須帶涼不可太溫桂枝麻黃大青龍鬚用加減夏至前桂枝加黃芩夏至後桂枝麻黃大青龍加知母石膏或加升麻蓋桂枝麻黃性熱地暖處非西北之比夏月服之必有發黃斑出之失熱病三日外與前湯不瘥脈勢仍數邪氣猶在經絡未入臟腑者桂枝石膏湯主之此方夏至後代桂枝證用若加麻黃可代麻黃青龍湯證也若三月至夏為晚發傷寒梔子升麻湯亦暫用之王宇泰述萬曆癸卯李氏一壻應舉南下時方盛暑傷寒一太學生新讀仲景書自謂知醫投以桂枝湯入腹即斃大抵麻黃桂枝二湯隆冬正傷寒之藥施之於溫病不可況於熱病乎正誤按活人以溫熱病用桂枝麻黃雖加涼藥終未免發散之誤不危幸也豈止三日外與前湯不瘥脈勢仍數而已哉至此尚然不悟為半里之證且言邪氣猶在經絡仍用桂枝石膏湯至死無悔王宇泰及王履非之甚當是以不用麻黃桂枝賢於活人書遠矣究竟不識溫熱之源是以不知用藥耳春溫活人書曰春應溫而清氣折之責邪在肝或身熱頭疼目眩嘔吐長幼率相似升麻葛根湯解肌湯四時通用敗毒散陶氏曰交春後至夏至前不惡寒而渴者為溫病用辛涼之藥微解不可大發汗急證現者用寒涼之藥急攻之不可誤汗誤下當須識此表證不與正傷寒同法里證同夏溫活人書曰夏應暑而寒氣折之責邪在心或身熱頭疼腹滿自利長幼率相似理中湯射干湯半夏桂枝湯陶氏曰交夏至有頭疼發熱不惡寒而渴此名溫病愈加熱者為熱病止用辛涼之藥解肌不宜大汗里證見者急攻下表證不與正傷寒同法里證治法同秋溫活人書曰秋應涼而大熱折之責邪在肺濕熱相搏民病咳嗽金沸草散白虎加蒼朮湯病疸發黃茵陳五苓散陶氏曰交秋至霜降前有頭疼發熱不惡寒身體痛小便短者名濕病亦用辛涼之藥加疏利以解肌亦不宜汗里證見者宜攻下表證不與正傷寒同冬溫活人書曰冬應寒而反大溫折之責邪在腎宜葳蕤湯丹溪曰冬溫為病非其時有其氣者冬時嚴寒君子當閉藏而反發泄於外專用補藥帶表藥正誤按西北高厚之地風高氣燥濕證希有南方卑濕之地更遇久雨淋漓時有感濕者在天地或時久雨或時亢旱蓋非時令所拘故傷濕之證隨時有之不待交秋而後能也推節庵之意以至春為溫病至夏為熱病至秋似不可復言溫熱然至秋冬又未免溫病只得勉以濕證抵搪且濕熱雜證更不得藉此混淆惟其不知溫病四時皆有故説到冬時遂付之不言宇泰因見陶氏不言乃引丹溪述非其時有其氣以補冬溫之缺然則冬時交錯之氣又不可以為冬溫也活人書但言四時之溫蓋不知溫之源故春責清氣夏責寒氣秋責熱氣冬責溫氣殊不知清溫寒熱總非溫病之源復以四時專令之臟而受傷不但膠柱鼓瑟且又罪及無辜矣
