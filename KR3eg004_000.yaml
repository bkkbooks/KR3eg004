body:
  text: 自敘夫溫疫之為病非風非寒非暑非濕乃天地間別有一種異氣所感其傳有九此治疫緊要關節奈何自古迄今從未有發明者仲景雖有傷寒論然其法始自太陽或傳陽明或傳少陽或三陽竟自傳胃蓋為外感風寒而設故其傳法與溫疫自是迥別嗣後論之者紛紛不止數十家皆以傷寒為辭其於溫疫證則甚略之是以業醫者所記所誦連篇纍牘俱系傷寒及其臨證悉見溫疫求其真傷寒百無一二不知屠龍之藝雖成而無所施未免指鹿為馬矣余初按諸家咸謂春夏秋皆是溫病而傷寒必在冬時然歷年較之溫疫四時皆有及究傷寒每至嚴寒雖有頭疼身痛惡寒無汗發熱總似太陽證至六七日失治未嘗傳經每用發散之劑一汗即解間有不藥亦自解者並未嘗因失汗以致發黃譫語狂亂苔刺等證此皆感冒膚淺之病非真傷寒也傷寒感冒均系風寒不無輕重之殊究竟感冒居多傷寒希有況溫疫與傷寒感受有霄壤之隔今鹿馬攸分益見傷寒世所絶少仲景以傷寒為急病倉卒失治多致傷生因立論以濟天下後世用心可謂仁矣然傷寒與溫疫均急病也以病之少者尚諄諄告世至於溫疫多於傷寒百倍安忍反置勿論或謂溫疫之證仲景原別有方論歷年既久兵火湮沒即傷寒論乃稱散亡之餘王叔和立方造論謬稱全書溫疫之論未必不由散亡也明矣崇禎辛巳疫氣流行山東浙省南北兩直感者尤多至五六月益甚或至闔門傳染始發之際時師誤以傷寒法治之未嘗見其不殆也或病家誤聽七日當自愈不爾十四日必瘳因而失治有不及期而死者或有妄用峻劑攻補失敘而死者或遇醫家見解不到心疑膽怯以急病用緩藥雖不即受其害然遷延而致死者比比皆是所感輕者尚獲僥幸感之重者更加失治枉死不可勝記嗟乎守古法不合今病以今病簡古書原無明論是以投劑不效醫者倣徨無措病者日近危篤病愈急投藥愈亂不死於病乃死於醫不死於醫乃死於聖經之遺亡也籲千載以來何生民不幸如此余雖固陋靜心窮理格其所感之氣所入之門所受之處及其傳變之體平日所用歷驗方法詳述於下以俟高明者正之時崇禎壬午仲秋姑蘇洞庭吳有性書於淡淡齋
