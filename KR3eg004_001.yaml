body:
  text: 上卷原病病疫之由昔以為非其時有其氣春應溫而反大寒夏應熱而反大涼秋應涼而反大熱冬應寒而反大溫得非時之氣長幼之病相似以為疫餘論則不然夫寒熱溫涼乃四時之常因風雨陰晴稍為損益假令秋熱必多晴春寒因多雨較之亦天地之常事未必多疫也傷寒與中暑感天地之常氣疫者感天地之癘氣在歲有多寡在方隅有厚薄在四時有盛衰此氣之來無論老少強弱觸之者即病邪自口鼻而入則其所客內不在臟腑外不在經絡舍於伏脊之內去表不遠附近於胃乃表裡之分界是為半表半裡即針經所謂橫連膜原是也胃為十二經之海十二經皆都會於胃故胃氣能敷布於十二經中而榮養百骸毫髮之間彌所不貫凡邪在經為表在胃為里今邪在膜原者正當經胃交關之所故為半表半裡其熱淫之氣浮越於某經即能顯某經之證如浮越於太陽則有頭項痛腰痛如折如浮越於陽明則有目痛眉稜骨痛鼻乾如浮越於少陽則有脅痛耳聾寒熱嘔而口苦大概觀之邪越太陽居多陽明次之少陽又其次也邪之所著有天受有傳染所感雖殊其病則一凡人口鼻之氣通乎天氣本氣充滿邪不易入本氣適逢虧欠呼吸之間外邪因而乘之昔有三人冒霧早行空腹者死飲酒者病飽食者不病疫邪所著又何異耶若其年氣來盛厲不論強弱正氣稍衰者觸之即病則又不拘於此矣其感之深者中而即發感之淺者邪不勝正未能頓發或遇飢飽勞碌憂思氣怒正氣被傷邪氣始得張溢營衛運行之機乃為之阻吾身之陽氣因而屈曲故為病熱其始也格陽於內不及於表故先凜凜惡寒甚則四肢厥逆陽氣漸積鬱極而通則厥回而中外皆熱至是但熱而不惡寒者因其陽氣之周也此際應有汗或反無汗者存乎邪結之輕重也即便有汗乃肌表之汗若外感在經之邪一汗而解今邪在半表半裡表雖有汗徒損真氣邪氣深伏何能得解必俟其伏邪漸退表氣潛行於內乃作大戰精氣自內由膜中以達表振戰止而復熱此時表裡相通故大汗淋漓衣被濕透邪從汗解此名戰汗當即脈靜身涼神清氣爽劃然而愈然有自汗而解者但出表為順即不藥亦自愈也伏邪未退所有之汗止得衛氣漸通熱亦暫減逾時復熱午後潮熱者至是郁甚陽氣與時消息也自後加熱而不惡寒者陽氣之積也其惡寒或微或甚因其人之陽氣盛衰也其發熱或久或不久或晝夜純熱或黎明稍減因其感邪之輕重也疫邪與瘧彷彿但瘧不傳胃惟疫乃傳胃始則皆先凜凜惡寒既而發熱又非若傷寒發熱而兼惡寒也至於伏邪動作方有變證其變或從外解或從內陷從外解者順從內陷者逆更有表裡先後不同有先表而後里者有先里而後表者有但表而不里者有但里而不表者有表裡偏勝者有表裡分傳者有表而再表者有里而再里者有表裡分傳而又分傳者從外解者或發斑或戰汗狂汗自汗盜汗從內陷者胸膈痞悶心下脹滿或腹中痛或燥結便秘或熱結旁流或協熱下利或嘔吐噁心譫語舌黃舌黑苔刺等證因證而知變因變而知治此言其大略詳見脈證治法諸條溫疫初起溫疫初起先憎寒而後發熱日後但熱而無憎寒也初得之二三日其脈不浮不沉而數晝夜發熱日晡益甚頭疼身痛其時邪在伏脊之前腸胃之後雖有頭疼身痛此邪熱浮越於經不可認為傷寒表證輒用麻黃桂枝之類強發其汗此邪不在經汗之徒傷表氣熱亦不減又不可下此邪不在裡下之徒傷胃氣其渴愈甚宜達原飲達原飲檳榔二錢厚朴一錢草果仁五分知母一錢芍藥一錢黃芩一錢甘草五分上用水二鍾煎八分午後溫服按檳榔能消能磨除伏邪為疏利之藥又除嶺南瘴氣厚朴破戾氣所結草果辛烈氣雄除伏邪盤踞三味協力直達其巢穴使邪氣潰敗速離膜原是以為達原也熱傷津液加知母以滋陰熱傷營血加白芍以和血黃芩清燥熱之餘甘草為和中之用以後四味不過調和之劑如渴與飲非拔病之藥也凡疫邪遊溢諸經當隨經引用以助升泄如脅痛耳聾寒熱嘔而口苦此邪熱溢於少陽經也本方加柴胡一錢如腰背項痛此邪熱溢於太陽經也本方加羌活一錢如目痛眉稜骨痛眼眶痛鼻乾不眠此邪熱溢於陽明經也本方加乾葛一錢證有遲速輕重不等藥有多寡緩急之分務在臨時斟酌所定分兩大略而已不可執滯間有感之輕者舌上白苔亦薄熱亦不甚而無數脈其不傳裡者一二劑自解稍重者必從汗解如不能汗乃邪氣盤踞於膜原內外隔絕表氣不能通於內裡氣不能達於外不可強汗或者見加發散之藥便欲求汗誤用衣被壅遏或將湯火熨蒸甚非法也然表裡隔絕此時無遊溢之邪在經三陽加法不必用宜照本方可也感之重者舌上苔如積粉滿布無隙服湯後不從汗解而從內陷者舌根先黃漸至中央邪漸入胃此三消飲證若脈長洪而數大汗多渴此邪氣適離膜原欲表未表此白虎湯證如舌上純黃色兼之裡證為邪已入胃此又承氣湯證也有二三日即潰而離膜原者有半月十數日不傳者有初得之四五日淹淹攝攝五六日後陡然勢張者凡元氣勝者毒易傳化元氣薄者邪不易化即不易傳設遇他病久虧適又染疫能感不能化安望其傳不傳則邪不去邪不去則病不瘳延纏日久愈沉愈伏多致不起時師誤認怯證日進參耆愈壅愈固不死不休也傳變不常疫邪為病有從戰汗而解者有從自汗盜汗狂汗而解者有無汗竟傳入胃者有自汗淋漓熱渴反甚終得戰汗方解者有胃氣壅鬱必因下乃得戰汗而解者有表以汗解里有餘邪不因他故越三五日前證復發者有發黃因下而愈者有發黃因下而斑出者有竟從發斑而愈者有里證急雖有斑非下不愈者此雖傳變不常亦疫之常變也有局外之變者男子適逢淫欲或向來下元空虛邪熱乘虛陷於下焦氣道不施以致小便閉塞小腹脹滿每至夜即發熱以導赤散五苓五皮之類分毫不效得大承氣一服小便如注而愈者或宿有他病一隅之虧邪乘宿昔所損而傳者如失血崩帶經水適來適斷心痛疝氣痰火喘急凡此皆非常變大抵邪行如水惟注者受之傳變不常皆因人而使蓋因疫而發舊病治法無論某經某病但治其疫而舊病自愈急證急攻溫疫發熱一二日舌上白苔如積粉早服達原飲一劑午前舌變黃色隨現胸膈滿痛大渴煩躁此伏邪即潰邪毒傳胃也前方加大黃下之煩渴少減熱去六七午後復加煩躁發熱通舌變黑生刺鼻如煙煤此邪毒最重復瘀到胃急投大承氣湯傍晚大下至夜半熱退次早鼻黑苔刺如失此一日之間而有三變數日之法一日行之因其毒甚傳變亦速用藥不得不緊設此證不服藥或投緩劑羈遲二三日必死設不死服藥亦無及矣嘗見溫疫二三日即斃者乃其類也表裡分傳溫疫舌上白苔者邪在膜原也舌根漸黃至中央乃邪漸入胃設有三陽現證用達原飲三陽加法因有里證復加大黃名三消飲三消者消內消外消不內外也此治疫之全劑以毒邪表裡分傳膜原尚有餘結者宜之三消飲檳榔草果厚朴白芍甘草知母黃芩大黃葛根羌活柴胡薑棗煎服熱邪散漫溫疫脈長洪而數大渴復大汗通身發熱宜白虎湯白虎湯石膏一兩知母五錢甘草五錢炒米一撮加姜煎服按白虎湯辛涼發散之劑清肅肌表氣分藥也蓋毒邪已潰中結漸開邪氣分離膜原尚未出表然內外之氣已通故多汗脈長洪而數白虎辛涼解散服之或戰汗或自汗而解若溫疫初起脈雖數未至洪大其時邪氣盤踞於膜原宜達原飲誤用白虎既無破結之能但求清熱是猶揚湯止沸也若邪已入胃非承氣不愈誤用白虎既無逐邪之能徒以剛悍而伐胃氣反抑邪毒致脈不行因而細小又認陽證得陰脈妄言不治醫見脈微欲絕益不敢議下日惟雜進寒涼以為穩當愈投愈危至死無悔此當急投承氣緩緩下之六脈自復內壅不汗邪發於半表半裡一定之法也至於傳變或出表或入里或表裡分傳醫見有表復有里乃引經論先解其表乃攻其里此大謬也嘗見以大劑麻黃連進一毫無汗轉見煩躁者何耶蓋發汗之理自內由中以達表今裡氣結滯陽氣不能敷布於外即四肢未免厥逆又安能氣液蒸蒸以達表譬如縛足之鳥乃欲飛昇其可得乎蓋鳥之將飛其身必伏先足縱而後揚翅方得升舉此與戰汗之義同又如水注閉其後竅則前竅不能涓滴與發汗之義同凡見表裡分傳之證務宜承氣先通其里裡氣一通不待發散多有自能汗解下後脈浮里證下後脈浮而微數身微熱神思或不爽此邪熱浮於肌表里無壅滯也雖無汗宜白虎湯邪從汗解若大下後或數下後脈空浮而數按之豁然如無宜白虎湯加人參覆杯則汗解下後脈浮而數原當汗解遷延五六日脈證不改仍不得汗者以其人或自利經久或素有他病先虧或本病日久不痊或反覆數下以致周身血液枯涸故不得汗白虎辛涼除肌表散漫之熱邪加人參以助周身之血液於是經絡潤澤元氣鼓舞腠理開發故得汗解下後脈復沉里證脈沉而數下後脈浮者當得汗解今不得汗後二三日脈復沉者膜原餘邪復瘀到胃也宜更下之更下後脈再浮者仍當汗解宜白虎湯邪氣復聚里證下後脈不浮煩渴減身熱退越四五日復發熱者此非關飲食勞復乃膜原尚有餘邪隱匿因而復發此必然之理不知者每每歸咎於病人誤也宜再下之即愈但當少與慎勿過劑以邪氣微也下後身反熱應下之證下後當脈靜身涼今反發熱者此內結開正氣通郁陽暴伸也即如爐中伏火撥開雖焰不久自息此與下後脈反數義同若溫疫將發原當日漸加熱胃本無邪誤用承氣更加發熱實非承氣使然乃邪氣方張分內之熱也但嫌下早之誤徒傷胃氣耳日後傳胃再當下之又有藥煩者與此懸絕詳載本條下後脈反數應下失下口燥舌乾而渴身反熱減四肢時厥欲得近火壅被此陽氣伏也既下厥回去爐減被脈大而加數舌上生津不思水飲此里邪去郁陽暴伸也宜柴胡清燥湯去花粉知母加葛根隨其性而升泄之此證類近白虎但熱渴既除又非白虎所宜也因證數攻溫疫下後二三日或一二日舌上覆生苔刺邪未盡也再下之苔刺雖未去已無鋒芒而軟然熱渴未除更下之熱渴減苔刺脫日後更復熱又生苔刺更宜下之餘里周因之者患疫月餘苔刺凡三換計服大黃二十兩始得熱不復作其餘脈證方退也所以凡下不以數計有是證則投是藥醫家見理不透經歷未到中道生疑往往遇此證反致耽擱但其中有間日一下者有應連下三四日者有應連下二日間一日者其中寬緩之間有應用柴胡清燥湯者有應用犀角地黃湯者至投承氣某日應多與某日應少與其間不能得法亦足以誤事此非可以言傳貴乎臨時斟酌朱海疇者年四十五歲患疫得下證四肢不舉身臥如塑目閉口張舌上苔刺問其所苦不能答因問其子兩三日所服何藥云進承氣湯三劑每劑投大黃兩許不效更無他策惟待日而已但不忍坐視更祈一診余診得脈尚有神下證悉具藥淺病深也先投大黃一兩五錢目有時而小動再投舌刺無芒口漸開能言三劑舌苔少去神思稍爽四日服柴胡清燥湯五日復生芒刺煩熱又加再下之七日又投承氣養榮湯熱少退八日仍用大承氣肢體自能少動計半月共服大黃十二兩而愈又數日始進糜粥調理兩月平復凡治千人所遇此等不過三四人而已姑存案以備參酌耳病愈結存溫疫下後脈證俱平腹中有塊按之則疼自覺有所阻而膨悶或時有升降之氣往來不利常作蛙聲此邪氣已盡其宿結尚未除也此不可攻攻之徒損元氣氣虛益不能傳送終無補於治結須飲食漸進胃氣稍復津液流通自能潤下也嘗遇病愈後食粥半月結塊方下堅黑如石下格溫疫愈後脈證俱平大便二三旬不行時時作嘔飲食不進雖少與湯水嘔吐愈加此為下格然下既不通必返於上設誤認翻胃乃與牛黃狗寶及誤作寒氣而以藿香丁香二陳之類誤也宜調胃承氣熱服頓下宿結及溏糞黏膠惡物臭不可當者嘔吐立止所謂欲求南風須開北牖是也嘔止慎勿驟補若少與參耆則下焦復閉嘔吐仍作也此與病愈結存彷彿彼則妙在往來蛙聲一證故不嘔而能食可見毫釐之差遂有千里之異按二者大便俱閉脈靜身涼一安一危者在乎氣通氣塞之間而已矣注意逐邪勿拘結糞溫疫可下者約三十餘證不必悉具但見舌黃心腹痞滿便於達原飲加大黃下之設邪在膜原者已有行動之機欲離未離之際得大黃促之而下實為開門祛賊之法即使未愈邪亦不能久羈二三日後餘邪入胃仍用小承氣徹其餘毒大凡客邪貴乎早治乘人氣血未亂肌肉未消津液未耗病人不至危殆投劑不至掣肘愈後亦易平復欲為萬全之策者不過知邪之所在早拔去病根為要耳但要諒人之虛實度邪之輕重察病之緩急揣邪氣離膜原之多寡然後藥不空投投藥無太過不及之弊是以仲景自大柴胡以下立三承氣多與少與自有輕重之殊勿拘於下不厭遲之說應下之證見下無結糞以為下之早或以為不應下之證誤投下藥殊不知承氣本為逐邪而設非專為結糞而設也必俟其糞結血液為熱所搏變證迭起是猶養虎遺患醫之咎也況多有溏糞失下但蒸作極臭如敗醬或如藕泥臨死不結者但得穢惡一去邪毒從此而消脈證從此而退豈徒孜孜糞結而後行哉假如經枯血燥之人或老人血液衰少多生燥結或病後血氣未復亦多燥結在經所謂不更衣十日無所苦有何妨害是知燥結不致損人邪毒之為殞命也要知因邪熱致燥結非燥結而致邪熱也但有病久失下燥結為之壅閉瘀邪鬱熱益難得泄結糞一行氣通而邪熱乃泄此又前後之不同總之邪為本熱為標結糞又其標也能早去其邪安患燥結耶假令滯下本無結糞初起質實頻數窘急者宜芍藥湯加大黃下之此豈亦因結糞而然耶乃為逐邪而設也或曰得毋為積滯而設與余曰非也邪氣客於下焦氣血壅滯泣而為積若去積以為治已成之積方去未成之積復生須用大黃逐去其邪是乃斷其生積之源營衛流通其積不治而自愈矣更有虛痢又非此論或問脈證相同其糞有結有不結者何也曰原其人病至大便當即不行續得蘊熱益難得出蒸而為結也一者其人平素大便不實雖胃家熱甚但蒸作極臭狀如黏膠至死不結應下之證設引經論初硬後必溏不可攻之句誠為千古之弊大承氣湯大黃五錢厚朴一錢枳實一錢芒硝三錢水姜煎服弱人減半邪微者各復減半小承氣湯大黃五錢厚朴一錢枳實一錢水姜煎服調胃承氣湯大黃五錢芒硝二錢五分甘草一錢水姜煎服按三承氣湯功用彷彿熱邪傳裡但上焦痞滿者宜小承氣湯中有堅結者加芒硝軟堅而潤燥病久失下雖無結糞然多黏膩極臭惡物得芒硝助大黃有盪滌之能設無痞滿惟存宿結而有瘀熱者調胃承氣宜之三承氣功效俱在大黃余皆治標之品也不奈湯藥者或嘔或畏當為細末蜜丸湯下蓄血大小便蓄血便血不論傷寒時疫蓋因失下邪熱久羈無由以泄血為熱搏留於經絡敗為紫血溢於腸胃腐為黑血便色如漆大便反易者雖結糞得瘀而潤下結糞雖行真元已敗多至危殆其有喜忘如狂者此胃熱波及於血分血乃心之屬血中留火延蔓心家宜其有是證矣仍從胃治發黃一證胃實失下表裡壅閉鬱而為黃熱更不泄搏血為瘀凡熱經氣不郁不致發黃熱不幹血分不致蓄血同受其邪故發黃而兼蓄血非蓄血而致發黃也但蓄血一行熱隨血泄黃因隨減嘗見發黃者原無瘀血有瘀血者原不發黃所以發黃當咎在經瘀熱若專治瘀血誤也胃移熱於下焦氣分小便不利熱結膀胱也移熱於下焦血分膀胱蓄血也小腹硬滿疑其小便不利今小便自利者責之蓄血也小便不利亦有蓄血者非小便自利便為蓄血也胃實失下至夜發熱者熱留血分更加失下必致瘀血初則晝夜發熱日晡益甚既投承氣晝日熱減至夜獨熱者瘀血未行也宜桃仁承氣湯服湯後熱除為愈或熱時前後縮短再服再短蓄血盡而熱亦盡大勢已去亡血過多余焰尚存者宜犀角地黃湯調之至夜發熱亦有癉瘧有熱入血室皆非蓄血並未可下宜審桃仁承氣湯大黃芒硝桃仁當歸芍藥丹皮照常煎服犀角地黃湯地黃一兩白芍三錢丹皮二錢犀角二錢研碎上先將地黃溫水潤透銅刀切作片石臼內搗爛再加水如糊絞汁聽用其滓入藥同煎藥成去滓入前汁合服按傷寒太陽病不解從經傳腑熱結膀胱其人如狂血自下者愈血結不行者宜抵當湯今溫疫起無表證而惟胃實故腸胃蓄血多膀胱蓄血少然抵當湯行瘀逐蓄之最者無分前後二便並可取用然蓄血結甚者在桃仁力所不及宜抵當湯蓋非大毒猛厲之劑不足以抵當故名之然抵當證所遇亦少此以備萬一之用抵當湯大黃五錢虻蟲二十枚炙乾研末桃仁五錢研加酒水蛭炙乾為末五分照常煎服發黃發黃疸是腑病非經病也疫邪傳裡遺熱下焦小便不利邪無輸泄經氣鬱滯其傳為疸身目如金者宜茵陳湯茵陳湯茵陳一錢山梔二錢大黃五錢水姜煎服按茵陳為治疸退黃之專藥今以病證較之黃因小便不利故用山梔除小腸屈曲之火瘀熱既除小便自利當以發黃為標小便不利為本及論小便不利病原不在膀胱乃系胃家移熱又當以小便不利為標胃實為本是以大黃為專功山梔次之茵陳又其次也設去大黃而服山梔茵陳是忘本治標鮮有效矣或用茵陳五苓不惟不能退黃小便間亦難利愚按舊論發黃有從濕熱有從陰寒者陰病發黃確有其證何得云妄濕熱發黃尤為最多大約如合曲相似飲入於胃胃氣薰蒸則成濕熱濕熱外蒸透入肌腠遂成黃病燥火焉有發黃之理此言為吳君白圭之玷邪在胸膈溫疫胸膈滿悶心煩喜嘔欲吐不吐雖吐而不得大吐腹不滿欲飲不能飲欲食不能食此疫邪留於胸膈宜瓜蒂散吐之瓜蒂散甜瓜蒂一錢赤小豆二錢研碎生山梔仁二錢上用水二鍾煎一鍾後入赤豆煎至八分先服四分一時後不吐再服盡吐之未盡煩滿尚存者再煎服如無瓜蒂以淡豆豉二錢代之辨明傷寒時疫或曰子言傷寒與時疫有霄壤之隔今用三承氣及桃仁承氣抵當茵陳諸湯皆傷寒方也既用其方必同其證子何言之異也曰夫傷寒必有感冒之因或單衣風露或強力入水或臨風脫衣或當檐出浴當覺肌肉粟起既而四肢拘急惡風惡寒然後頭疼身痛發熱惡寒脈浮而數脈緊無汗為傷寒脈緩有汗為傷風時疫初起原無感冒之因忽覺凜凜以後但熱而不惡寒然亦有所觸因而發者或飢飽勞碌或焦思氣鬱皆能觸動其邪是促其發也不因所觸無故自發者居多促而發者十中之一二耳且傷寒投劑一汗而解時疫發散雖汗不解傷寒不傳染於人時疫能傳染於人傷寒之邪自毫竅而入時疫之邪自口鼻入傷寒感而即發時疫感久而後發傷寒汗解在前時疫汗解在後傷寒投劑可使立汗時疫汗解俟其內潰汗出自然不可以期傷寒解以發汗時疫解以戰汗傷寒發斑則病篤時疫發斑則病衰傷寒感邪在經以經傳經時疫感邪在內內溢於經經不自傳傷寒感發甚暴時疫多有淹纏二三日或漸加重或淹纏五六日忽然加重傷寒初起以發表為先時疫初起以疏利為主種種不同其所同者傷寒時疫皆能傳胃至是同歸於一故用承氣湯輩導邪而出要之傷寒時疫始異而終同也夫傷寒之邪自肌表一徑傳裡如浮雲之過太虛原無根蒂惟其傳法始終有進而無退故下後皆能脫然而愈時疫之邪始則匿於膜原根深蒂固發時與營衛交併客邪經由之處營衛未有不被其所傷者因其傷故名曰潰然不潰則不能傳不傳邪不能出邪不出而疾不瘳時疫下後多有未能頓解者何耶蓋疫邪每有表裡分傳者因有一半向外傳則邪留於肌肉一半向內傳則邪留於胃家邪留於胃故里氣結滯裡氣結表氣因而不通於是肌肉之邪不能即達於肌表下后里氣一通表氣亦順曏者鬱於肌肉之邪方能盡發於肌表或斑或汗然後脫然而愈傷寒下後無有此法雖曰終同及細較之而終又有不同者矣或曰傷寒感天地之正氣時疫感天地之戾氣氣既不同俱用承氣又何藥之相同也曰風寒疫邪與吾身之真氣勢不兩立一有所著氣壅火積氣也火也邪也三者混一與之俱化失其本然之面目至是均為之邪矣但以驅逐為功何論邪之同異也假如初得傷寒為陰邪主閉藏而無汗傷風為陽邪主開發而多汗始有桂枝麻黃之分原其感而未化也傳至少陽並用柴胡傳至胃家並用承氣至是亦無復有風寒之分矣推而廣之是知疫邪傳胃治法無異也發斑戰汗合論凡疫邪留於氣分解以戰汗留於血分解以發斑氣屬陽而輕清血屬陰而重濁是以邪在氣分則易疏透邪在血分恆多膠滯故陽主速而陰主遲所以從戰汗者可使頓解從發斑者當圖漸愈戰汗疫邪先傳表後傳里忽得戰汗經氣輸泄當即脈靜身涼煩渴頓除三五日後陽氣漸積不待飲食勞碌或有反復者蓋表邪已解里邪未去才覺發熱下之即解疫邪表裡分傳裡氣壅閉非汗下不可汗下之未盡日後復熱當復下復汗溫疫下後煩渴減腹滿去或思食而知味裡氣和也身熱未除脈近浮此邪氣拂鬱於經表未解也當得汗解如未得汗以柴胡清燥湯和之復不得汗者從漸解也不可苛求其汗應下失下氣消血耗既下欲作戰汗但戰而不汗者危以中氣虧微但能降陷不能升發也次日當期復戰厥回汗出者生厥不回汗不出者死以正氣脫不勝其邪也戰而厥回無汗者真陽尚在表氣枯涸也可使漸愈凡戰而不復忽痙者必死痙者身如屍牙關緊目上視凡戰不可擾動但可溫覆擾動則戰而中止次日當期復戰戰汗後復下後越二三日反腹痛不止者欲作滯下也無論已見積未見積宜芍藥湯芍藥湯白芍一錢當歸一錢檳榔二錢厚朴一錢甘草七分水姜煎服裡急後重加大黃三錢紅積倍芍藥白積倍檳榔自汗自汗者不因發散自然汗出也伏邪中潰氣通得汗邪欲去也若脈長洪而數身熱大渴宜白虎湯得戰汗方解里證下後續得自汗雖二三日不止甚則四五日不止身微熱熱甚則汗甚熱微汗亦微此屬實乃表有留邪也邪盡汗止汗不止者宜柴胡以佐之表解則汗止設有三陽經證當用三陽隨經加減法與協熱下利投承氣同義表裡雖殊其理則一若誤認為表虛自汗輒用黃耆實表及止汗之劑則誤矣有里證時當盛暑多作自汗宜下之白虎證自汗詳見前若面無神色唇口刮白表裡無陽證喜熱飲稍冷則畏脈微欲絕忽得自汗淡而無味者為虛脫夜發則晝死晝發則夜亡急當峻補補不及者死大病愈後數日每飲食及驚動即汗此表裡虛怯宜人參養榮湯倍黃耆盜汗里證下後續得盜汗者表有微邪也若邪甚竟作自汗伏邪中潰則作戰汗矣凡人目張則衛氣行於陽目瞑則衛氣行於陰行陽謂升發於表行陰謂斂降於內今內有伏熱而又遇衛氣兩陽相搏熱蒸於外則腠理開而盜汗出矣若內伏之邪一盡則盜汗自止設不止者宜柴胡湯以佐之時疫愈後脈靜身涼數日後反得盜汗及自汗者此屬表虛宜黃耆湯柴胡湯柴胡三錢黃芩一錢陳皮一錢甘草一錢生薑一錢大棗二枚古方用人參半夏今表裡實故不用人參無嘔吐不加半夏黃耆湯黃耆三錢五味子三錢當歸一錢白朮一錢甘草五分照常煎服如汗未止加麻黃淨根一錢五分無有不止者然屬實常多屬虛常少邪氣盛為實正氣奪為虛虛實之分在乎有熱無熱有熱為實無熱為虛若顛倒誤用未免實實虛虛之誤臨證當慎狂汗狂汗者伏邪中潰欲作汗解因其人稟賦充盛陽氣衝擊不能頓開故忽然坐臥不安且狂且躁少頃大汗淋漓狂躁頓止脈靜身涼霍然而愈發斑邪留血分裡氣壅閉則伏邪不得外透而為斑若下之內壅一通則衛氣亦從而疏暢或出表為斑則毒邪亦從而外解矣若下後斑漸出不可更大下設有下證少與承氣緩緩下之若復大下中氣不振斑毒內陷則危宜托裡舉斑湯托裡舉斑湯白芍當歸各一錢升麻五分白芷柴胡各七分穿山甲二錢炙黃水姜煎服下後斑漸出復大下斑毒復隱反加循衣摸床撮空理線脈漸微者危本方加人參一錢補不及者死若未下而先發斑者設有下證少與承氣須從緩下數下亡陰下證以邪未盡不得已而數下之間有兩目加澀舌反枯乾津不到咽唇口燥裂緣其人所稟陽臟素多火而陰虧今重亡津液宜清燥養榮湯設熱渴未除里證仍在宜承氣養榮湯解後宜養陰忌投參朮夫疫乃熱病也邪氣內郁陽氣不得宣布積陽為火陰血每為熱搏暴解之後余焰尚在陰血未復大忌參耆白朮得之反助其壅鬱餘邪留伏不惟目下淹纏日後必變生異證或周身痛痹或四肢攣急或流火結痰或遍身瘡瘍或兩腿攢痛或勞嗽湧痰或氣毒流注或痰核穿漏皆驟補之為害也凡有陰枯血燥者宜清燥養榮湯若素多痰及少年平時肥盛者投之恐有膩膈之弊亦宜斟酌大抵時疫愈後調理之劑投之不當莫如靜養節飲食為第一清燥養榮湯知母天花粉當歸身白芍地黃汁陳皮甘草加燈心煎服表有餘熱宜柴胡養榮湯柴胡養榮湯柴胡黃芩陳皮甘草當歸白芍生地知母天花粉薑棗煎服里證未盡宜承氣養榮湯承氣養榮湯知母當歸芍藥生地大黃枳實厚朴水姜煎服痰涎湧甚胸膈不清者宜蔞貝養榮湯蔞貝養榮湯知母花粉貝母栝蔞實橘紅白芍當歸紫蘇子水姜煎服用參宜忌有前利後害之不同凡人參所忌者里證耳邪在表及半表半裡者投之不妨表有客邪者古方如參蘇飲小柴胡湯敗毒散是也半表半裡者如久瘧挾虛用補中益氣不但無礙而且得效即使暴瘧邪氣正盛投之不當亦不至脹為無里證也夫里證者不特傷寒溫疫傳胃至如雜證氣鬱血鬱火鬱濕鬱痰鬱食鬱之類皆為里證投之即脹者蓋以實填實也今溫疫下後適有暫時之通即投人參因而不脹醫者病者以為用參之後雖不見佳處然不為禍便為是福乃恣意投之不知參乃行血里之補藥下後雖通餘邪尚在再四服之則助邪填實前證復起禍害隨至矣間有失下以致氣血虛耗者有因邪盛數下及大下而挾虛者遂投人參當覺精神爽慧醫者病者皆以為得意明後日再三投之即加變證蓋下後始則胃家乍虛沾其補益而快殊弗思餘邪未盡恣意投之則漸加壅閉邪火復熾愈投而變證愈增矣所以下後邪緩虛急是以補性之效速而助邪之害緩故前後利害之不同者有如此下後間服緩劑下後或數下膜原尚有餘邪未盡傳胃邪熱與衛氣相併故熱不能頓除當寬緩兩日俟餘邪聚胃再下之宜柴胡清燥湯緩劑調理柴胡清燥湯柴胡黃芩陳皮甘草花粉知母薑棗煎服下後反痞疫邪留於心胸令人痞滿下之痞應去今反痞者虛也以其人或因他病先虧或因新產後氣血兩虛或稟賦嬌怯因下益虛失其健運邪氣留止故令痞滿今愈下而痞愈甚若更用行氣破氣之劑轉成壞證宜參附養營湯參附養營湯當歸一錢白芍一錢生地三錢人參一錢附子炮七分乾薑炒一錢照常煎服果如前證一服痞如失倘有下證下後脈實痞未除者再下之此有虛實之分一者有下證下後痞即減者為實一者表雖微熱脈不甚數口不渴下後痞反甚者為虛若潮熱口渴脈數而痞者投之禍不旋踵下後反嘔疫邪留於心胸胃口熱甚皆令嘔不止下之嘔當去今反嘔者此屬胃氣虛寒少進粥飲便欲吞酸者宜半夏藿香湯一服嘔立止穀食漸加半夏藿香湯半夏一錢五分真藿香一錢乾薑炒一錢白茯苓一錢廣陳皮一錢白朮炒一錢甘草五分水姜煎服有前後一證首尾兩變者有患時疫心下脹滿口渴發熱而嘔此應下之證也下之諸證減去六七嘔亦減半再下之脹除熱退渴止向則數日不眠今則少寐嘔獨轉甚此疫毒去而諸證除胃續寒而嘔甚與半夏藿香湯一劑而嘔即止奪液無汗溫疫下後脈沉下證未除再下之下後脈浮者法當汗解三五日不得汗者其人預亡津液也時疫得下證日久失下日逐下利純臭水晝夜十數行乃致口燥唇乾舌裂如斷醫者誤按仲景協熱下利法因與葛根黃連黃芩湯服之轉劇邀予診視乃熱結旁流急與大承氣一服去宿糞甚多色如敗醬狀如黏膠臭惡異常是晚利頓止次日服清燥湯一劑脈尚沉再下之脈始浮下證減去肌表僅存微熱此應汗解雖不得汗然里邪先盡中氣和平所以飲食漸進半月後忽作戰汗表邪方解蓋緣下利日久表裡枯燥之極飲食半月津液漸回方可得汗所謂積流而渠自通也可見脈浮身熱非汗不解血燥津枯非液不汗昔人以奪血無汗今以奪液無汗血液雖殊枯燥則一也補瀉兼施證本應下耽擱失治或為緩藥羈遲火邪壅閉耗氣搏血精神殆盡邪火獨存以致循衣摸床撮空理線筋惕肉瞤肢體振戰目中不了了皆緣應下失下之咎邪熱一毫未除元神將脫補之則邪毒愈甚攻之則幾微之氣不勝其攻攻不可補不可補瀉不及兩無生理不得已勉用陶氏黃龍湯此證下亦死不下亦死與其坐以待斃莫如含藥而亡或有回生於萬一者黃龍湯大黃厚朴枳實芒硝人參地黃當歸照常煎服按前證實為庸醫耽擱及今投劑補瀉不及然大虛不補虛何由以回大實不瀉邪何由以去勉用參地以回虛承氣以逐實此補瀉兼施之法也或遇此證純用承氣下證稍減神思稍蘇續得肢體振戰怔忡驚悸心內如人將捕之狀四肢反厥眩暈鬱冒項背強直並前循衣摸床撮空等證此皆大虛之候將危之證也急用人參養營湯虛候少退速可摒去蓋傷寒溫疫俱系客邪為火熱燥證人參固為益元氣之神品偏於益陽有助火固邪之弊當此又非良品也不得已而用之人參養營湯人參八分麥冬七分遼五味一錢地黃五分歸身八分白芍藥一錢五分知母七分陳皮六分甘草五分照常煎服如人方肉食而病適來以致停積在胃用大小承氣連下惟是臭水稀糞而已於承氣湯中但加人參一味服之雖三四十日所停之完穀及完肉於是方下蓋承氣藉人參之力鼓舞胃氣宿物始動也藥煩應下失下真氣虧微及投承氣下咽少頃額上汗出髮根燥癢邪火上炎手足厥冷甚則振戰心煩坐臥不安如狂之狀此中氣素虧不能勝藥名為藥煩凡遇此證急投薑湯即已藥中多加生薑煎服則無此狀矣更宜均兩三次服以防嘔吐不納停藥服承氣腹中不行或次日方行或半日仍吐原藥此因病久失下中氣大虧不能運藥名為停藥乃天元幾絕大凶之兆也宜生薑以和藥性或加人參以助胃氣更有邪實病重劑輕亦令不行虛煩似狂時疫坐臥不安手足不定臥未穩則起坐才著坐即亂走才抽身又欲臥無有寧刻或循衣摸床撮空捻指師至才診脈將手縮去六脈不甚顯尺脈不至此平時斫喪根源虧損因不勝其邪元氣不能主持故煩躁不寧固非狂證其危有甚於狂也法當大補然有急下者或下後厥回尺脈至煩躁少定此因邪氣少退正氣暫復微陽少伸也不二時邪氣復聚前證復起勿以前下得效今再下之下之速死急宜峻補補不及者死此證表裡無大熱下證不備者庶幾可生譬如城郭空虛雖殘寇而能直入戰不可守不可其危可知神虛譫語應下稽遲血竭氣耗內熱煩渴譫語諸下證具而數下之渴熱並減下證悉去五六日後譫語不止者不可以為實此邪氣去元神未復宜清燥養榮湯加辰砂一錢鄭聲譫語態度無二但有虛實之分不應兩立名色奪氣不語時疫下後氣血俱虛神思不清惟向里床睡似寐非寐似寤非寤呼之不應此正氣奪與其服藥不當莫如靜守虛回而神思自清語言漸朗若攻之脈必反數四肢漸厥此虛虛之禍危在旦夕凡見此證表裡無大熱者宜人參養榮湯補之能食者自然虛回而前證自除設不食者正氣愈奪虛證轉加法當峻補老少異治三春旱草得雨滋榮殘臘枯枝雖灌弗澤凡年高之人最忌剝削設投承氣以一當十設用參朮十不抵一蓋老年榮衛枯澀幾微之元氣易耗而難復也不比少年氣血生機甚捷其勢浡然但得邪氣一除正氣隨復所以老年慎瀉少年慎補何況誤用耶萬有年高稟厚年少賦薄者又當從權勿以常論妄投破氣藥論溫疫心下脹滿邪在裡也若純用青皮枳實檳榔諸香燥破氣之品冀其寬脹此大謬也不知內壅氣閉原有主客之分假令根於七情鬱怒肝氣上升飲食過度胃氣填實本無外來邪毒客氣相干止不過自身之氣壅滯投木香砂仁豆蔻枳殼之類上升者即降氣閉者即通無不見效今疫毒之氣傳於胸胃以致升降之氣不利因而脹滿實為客邪累及本氣但得客氣一除本氣自然升降脹滿立消若專用破氣之劑但能破正氣毒邪何自而泄脹滿何由而消治法非用小承氣弗愈既而腸胃燥結下既不通中氣鬱滯上焦之氣不能下降因而充積即膜原或有未盡之邪亦無前進之路於是表裡上中下三焦皆阻故為痞滿燥實之證得大承氣一行所謂一竅通諸竅皆通大關通而百關盡通也向所鬱於腸胃之邪由此而下腸胃既舒在膜原設有所傳不盡之餘邪方能到胃乘勢而下也譬若河道阻塞前舟既行余舟連尾而下矣至是邪結並去脹滿頓除皆藉大黃之力大黃本非破氣藥以其潤而最降故能逐邪拔毒破結導滯加以枳樸者不無佐使云爾若純用破氣之品津液愈耗熱結愈固滯氣無門而出疫毒無路而泄乃望其寬胸利膈惑之甚矣妄投補劑論有邪不除淹纏日久必至尫羸庸醫望之輒用補劑殊不知無邪不病邪去而正氣得通何患乎虛之不復也今投補劑邪氣益固正氣日郁轉郁轉熱轉熱轉瘦轉瘦轉補轉補轉郁循環不已乃至骨立而斃猶言服參幾許補之不及天數也病家止誤一人醫者終身不悟不知殺人無算妄投寒涼藥論疫邪結於膜原與衛氣並固而晝夜發熱五更稍減日晡益甚此與癉瘧相類癉瘧熱短過時如失明日至期復熱今溫疫熱長十二時中首尾相接寅卯之間乃其熱之首尾也即二時余焰不清似乎日夜發熱且其始也邪結膜原氣併為熱胃本無病誤用寒涼妄伐生氣此其誤者一及邪傳胃煩渴口燥舌乾苔刺氣噴如火心腹痞滿午後潮熱此應下之證若用大劑芩連梔柏專務清熱竟不知熱不能自成其熱皆由邪在胃家阻礙正氣鬱而不通火亦留止積火成熱但知火與熱不知因邪而為火熱智者必投承氣逐去其邪氣行火泄而熱自已若概用寒涼何異揚湯止沸每見今醫好用黃連解毒湯黃連瀉心湯蓋本素問熱淫所勝治以寒涼以為聖人之言必不我欺況熱病用寒藥最是捷徑又何疑乎每遇熱甚反指大黃能瀉而損元氣黃連清熱且不傷元氣更無下泄之患且得病家無有疑慮守此以為良法由是凡遇熱證大劑與之二三錢不已增至四五錢熱又不已晝夜連進其病轉劇至此技窮力竭反謂事理當然又見有等日久腹皮貼背乃調胃承氣證也況無痞滿益不敢議承氣唯類聚寒涼專務清熱又思寒涼之最者莫如黃連因而再倍之日近危篤有邪不除耽誤至死猶言服黃連至幾兩熱不能清非藥之不到或言不治之證或言病者之數也他日凡遇此證每每如是雖父母妻子不過以此法毒之蓋不知黃連苦而性滯寒而氣燥與大黃均為寒藥大黃走而不守黃連守而不走一燥一潤一通一塞相去甚遠且疫邪首尾以通行為治若用黃連反招閉塞之害邪毒何由以瀉病根何由以拔既不知病原焉能以愈疾耶問曰間有進黃連而得效者何也曰其人正氣素勝又因所受之邪本微此不藥自愈之證醫者誤投溫補轉補轉郁轉郁轉熱此以三分客熱轉加七分本熱也客熱者因客邪所郁正分之熱也此非黃連可愈本熱者因誤投溫補正氣轉郁反致熱極故續加煩渴不眠譫語等證此非正分之熱乃庸醫添造分外之熱也因投黃連於是煩渴不眠譫語等證頓去要之黃連但可清去七分無邪本熱又因熱減而正氣即回所存三分有邪客熱氣行即已也醫者不解遂以為黃連得效他日藉此概治客熱則無效矣必以昔效而今不效疑其病原本重非藥之不到也執迷不悟所害更不可勝計矣問曰間有未經溫補之誤進黃連而疾愈者何也曰凡元氣勝病為易治病勝元氣為難治元氣勝病者雖誤治未必皆死病勝元氣者稍誤未有不死者此因其人元氣素勝所感之邪本微是正氣有餘足以勝病也雖少與黃連不能抑鬱正氣此為小逆以正氣猶勝而疾幸愈也醫者不解竊自邀功他日設遇邪氣勝者非導邪不能瘳其疾誤投黃連反招閉塞之害未有不危者大便熱結旁流協熱下利大便閉結大腸膠閉總之邪在裡其證不同者在乎通塞之間耳協熱下利者其人大便素不調邪氣忽乘於胃便作煩渴一如平時泄瀉稀糞而色不敗其色但焦黃而已此伏邪傳裡不能稽留於胃至午後潮熱便作泄瀉子後熱退泄瀉亦減次日不作潮熱利亦止為病愈潮熱未除利不止者宜小承氣湯以徹其餘邪而利自止利止二三日後午後忽加煩渴潮熱下泄仍如前證此伏邪未盡復傳到胃也治法同前大便閉結者疫邪傳裡內熱壅鬱宿糞不行蒸而為結漸至更硬下之結糞一行瘀熱自除諸證悉去熱結旁流者以胃家實內熱壅閉先大便閉結續得下利純臭水全然無糞日三四度或十數度宜大承氣湯得結糞而利立止服湯不得結糞仍下利並臭水及所進湯藥因大腸邪勝失其傳送之職知邪猶在也病必不減宜更下之大腸膠閉者其人平素大便不實設遇疫邪傳裡但蒸作極臭然如黏膠至死不結但愈蒸愈閉以致胃氣不能下行疫毒無路而出不下即死但得黏膠一去下證自除霍然而愈溫疫愈後三五日或數日反腹痛裡急者非前病原也此下焦別有伏邪所發欲作滯下也發於氣分則為白積發於血分則為紅積氣血俱病紅白相兼邪盡利止未止者宜芍藥湯方見前戰汗條愈後大便數日不行別無他證此足三陰不足以致大腸虛燥此不可攻飲食漸加津液流通自能潤下也覺穀道夯悶宜作蜜煎導甚則宜六成湯病愈後脈遲細而弱每至黎明或夜半後便作泄瀉此命門真陽不足宜七成湯或亦有雜證屬實者宜大黃丸下之立愈六成湯當歸一錢五分白芍藥一錢地黃五錢天門冬一錢肉蓯蓉三錢麥門冬一錢照常煎服日後更燥者宜六味丸少減澤瀉七成湯破故紙炒錘碎三錢熟附子一錢遼五味八分白茯苓一錢人參一錢甘草炙五分照常煎服愈後更發者宜八味丸倍加附子小便熱到膀胱小便赤色邪到膀胱干於氣分小便膠濁干於血分溺血蓄血留邪欲出小便數急膀胱不約小便自遺膀胱熱結小便閉塞熱到膀胱者其邪在胃胃熱灼於下焦在膀胱但有熱而無邪惟令小便赤色而已其治在胃邪到膀胱者乃疫邪分布下焦膀胱實有之邪不一於熱也從胃家來治在胃兼治膀胱若純治膀胱胃氣乘勢捅入膀胱非其治也若腸胃無邪獨小便急數或白膏如馬遺其治在膀胱宜豬苓湯豬苓湯邪干氣分者宜之豬苓二錢澤瀉一錢滑石五分甘草八分木通一錢車前二錢燈心煎服桃仁湯邪乾血分者宜之桃仁三錢研如泥丹皮一錢當歸一錢赤芍一錢阿膠二錢滑石二錢照常煎服小腹痛按之硬痛小便自調有蓄血也加大黃三錢甚則抵當湯藥分三等隨其病之輕重而施治前後虛實病有先虛後實者宜先補而後瀉先實而後虛者宜先瀉而後補假令先虛後實者或因他病先虧或因年高血弱或因先有勞倦之極或因新產下血過多或舊有吐血及崩漏之證時疫將發即觸動舊疫或吐血或崩漏以致亡血過多然後疫氣漸漸加重以上並宜先補而後瀉瀉者謂疏導之劑並承氣下藥概而言之也凡遇先虛後實者此萬不得已而投補劑一二帖後虛證少退便宜治疫若補劑連進必助疫邪禍害隨至假令先實而後虛者疫邪應下失下血液為熱搏盡原邪尚在宜急下之邪退六七急宜補之虛回五六慎勿再補多服則前邪復起下後必竟加添虛證者方補若以意揣度其虛不加虛證誤用補劑貽害不淺脈厥溫疫得里證神色不敗言動自如別無怪證忽然六脈如絲沉細而軟甚至於無或兩手俱無或一手先伏察其人不應有此脈今有此脈者皆緣應下失下內結壅閉營氣逆於內不能達於四末此脈厥也亦多有過用黃連石膏諸寒之劑強遏其熱致邪愈結脈愈不行醫見脈微欲絕以為陽證得陰脈為不治委而棄之以此誤人甚眾若更用人參生脈散輩禍不旋踵宜承氣緩緩下之六脈自復脈證不應表證脈不浮者可汗而解以邪氣微不能牽引正氣故脈不應里證脈不沉者可下而解以邪氣微不能抑鬱正氣故脈不應陽證見陰脈有可生者神色不敗言動自如乃稟賦脈也再問前日無此脈乃脈厥也下後脈實亦有病愈者但得證減復有實脈乃天年脈也夫脈不可一途而取須以神氣形色病證相參以決安危為善張昆源正年六旬得滯下後重窘急日三四十度脈常歇止諸醫以為雀啄脈必死之候咸不用藥延予診視其脈參伍不調或二動一止或三動一止而復來此澀脈也年高血弱下利膿血六脈短澀固非所能任詢其飲食不減形色不變聲音烈烈言語如常非危證也遂用芍藥湯加大黃三錢大下純膿成塊者兩碗許自覺舒快脈氣漸續而利亦止數年後又得傷風咳嗽痰涎湧甚診之又得前脈與杏桔湯二劑嗽止脈調乃見其婦凡病善作此脈大抵治病務以形色脈證參考庶不失其大體方可定其吉凶也體厥陽證陰脈身冷如冰為體厥施幼聲賣卜頗行年四旬稟賦肥甚六月患時疫口燥舌乾苔刺如鋒不時太息咽喉腫痛心腹脹滿按之痛甚渴思冰水日晡益甚小便赤澀得涓滴則痛甚此下證悉備但通身肌表如冰指甲青黑六脈如絲尋之則有稍按則無醫者不究里證熱極但引陶氏全生集以為陽證但手足厥逆若冷過乎肘膝便是陰證今已通身冰冷比之冷過肘膝更甚宜其為陰證一也且陶氏以脈分陰陽二證全在有力無力中分今已脈微欲絕按之如無比之無力更甚宜其為陰證二也陰證而得陰脈之至有何說焉以內諸陽證竟置不問遂投附子理中湯未服延予至以脈相參表裡正較此陽證之最者下證悉具但嫌下之晚耳蓋因內熱之極氣道壅閉乃至脈微欲絕此脈厥也陽鬱則四肢厥逆若素稟肥盛尤易壅閉今亢陽已極以至通身冰冷此體厥也六脈如無者群龍無首之象證亦危矣急投大承氣湯囑其緩緩下之脈至厥回便得生矣其妻聞一曰陰證一曰陽證天地懸隔疑而不服更請一醫指言陰毒須灸丹田其兄疊延三醫續至皆言陰證妻乃惶惑病者自言何不卜之神明遂卜得從陰則吉從陽則凶更惑於醫之議陰證者居多乃進附子湯下之如火煩躁頓加乃嘆曰吾已矣藥之所誤也言未已更加之不逾時乃卒嗟乎向以卜謀生終以卜致死欺人還自誤可為醫巫之戒乘除病有純虛純實非補即瀉何有乘除設遇既虛且實者補瀉間用當詳孰先孰後從少從多可緩可急隨其證而調之醫案吳江沈青來正少寡素多鬱怒而有吐血證歲三四發吐後即已無有他證蓋不以為事也三月間別無他故忽有小發熱頭疼身痛不惡寒而微渴惡寒不渴者感冒風寒今不惡寒微渴者疫也至第二日舊證大發吐血勝常更加眩暈手振煩躁種種虛躁飲食不進且熱漸加重醫者病者但見吐血以為舊證復發不知其為疫也故以發熱認為陰虛頭疼身痛認為血虛不察未吐血前一日已有前證非吐血後所加之證也諸醫議補問予可否余曰失血補虛權宜則可蓋吐血者內有結血正血不歸經所以吐也結血牢固豈能吐乎能去其結於中無阻血自歸經方冀不發若吐後專補內則血滿既滿不歸血從上溢也設用寒涼尤誤投補劑者只顧目前之虛用參暫效不能拔去病根日後又發也況又兼疫今非昔比今因疫而發血脫為虛邪在為實是虛中有實若投補劑始則以實填虛沾其補益既而以實填實災害並至於是暫用人參二錢以茯苓歸芍佐之兩劑後虛證咸退熱減六七醫者病者皆謂用參得效均欲速進余禁之不止乃恣意續進便覺心胸煩悶腹中不和若有積氣求噦不得此氣不時上升便欲作嘔心下難過遍體不舒終夜不寐喜按摩捶擊此皆外加有餘之變證也所以然者止有三分之疫只應三分之熱適有七分之虛經絡枯澀陽氣內陷故有十分之熱分而言之其間是三分實熱七分虛熱也向則本氣空虛不與邪搏故無有餘之證但虛不任邪惟懊憹鬱冒眩暈而已今投補劑是以虛證減去熱減六七所餘三分之熱者實熱也乃是病邪所致斷非人參可除者今再服之反助疫邪邪正相搏故加有餘之變證因少與承氣微利之而愈按此病設不用利藥宜靜養數日亦愈以其人大便一二日一解則知胃氣通行邪氣在內日從胃氣下趨故自愈間有大便自調而不愈者內有灣糞隱曲不得下下得宿糞極臭者病始愈設邪未去恣意投參病乃益固日久不除醫見形體漸瘦便指為怯證愈補愈危死者多矣要之真怯證世間從來罕有令患怯證者皆是人參造成近代參價若金服者不便是以此證不生於貧家多生於富室也
